<script>
const Q = [

// ══ JENKINS / CI-CD ══
{cat:"Jenkins",diff:"medium",
q:"Walk me through your Jenkins CI/CD pipeline. What stages, triggers, and integrations?",
sub:"Focus: stage order, what happens on failure, how builds are triggered",
v1:`<span class="hl">Jenkinsfile (Declarative Pipeline)</span> — stored in repo root, version-controlled.

<span class="hl2">Stage order:</span>
1. Checkout — Git pull from <span class="cmd">Azure DevOps Repos</span> (webhook on push/PR)
2. Install — <span class="cmd">composer install --no-dev</span> / <span class="cmd">npm ci</span>
3. Code Quality — SonarQube Scanner → <span class="cmd">waitForQualityGate abortPipeline:true</span>
4. Unit Test — PHPUnit / pytest — JUnit XML archived in Jenkins
5. Package — zip artifact OR <span class="cmd">docker build</span> → tag with GIT_COMMIT_SHORT
6. Push — artifact to S3 / image to ECR
7. Deploy — trigger Ansible playbook via <span class="cmd">ansible-playbook deploy.yml -e version=$BUILD_NUMBER</span>
8. Health Check — <span class="cmd">curl -f http://app/health</span> — fail build if not 200

<span class="hl2">Infrastructure:</span>
• Master on EC2 t3.medium, agent nodes per project (env isolation)
• Azure DevOps webhooks trigger builds — PR → validation pipeline, merge to main → deploy pipeline`,
v2:`<span class="hl3">2023 improvements:</span>
• <span class="cmd">parallel {}</span> stages — SonarQube + unit tests ran simultaneously → 35% faster pipelines
• Jenkins Shared Libraries for DRY code across 6 client projects
• Docker-in-Docker ephemeral agents — no static EC2 agent sprawl
• <span class="cmd">input</span> step for manual prod approval gate
• Slack integration: <span class="cmd">post { failure { slackSend ... } always { junit ... } }</span>`,
tip:"'Shift-left' = catching failures earlier in pipeline. SonarQube blocking the build is your best example of this.",
trap:"Don't say 'Jenkins just runs scripts'. Each stage catches a specific category of failure. Show you designed it with intent."},

{cat:"Jenkins",diff:"medium",
q:"How did you integrate Jenkins with Azure DevOps Repos? Challenges faced?",
sub:"Focus: plugin, auth, webhook setup, branch strategy",
v1:`<span class="hl2">Plugin:</span> Azure DevOps plugin (formerly VSTS plugin)

<span class="hl2">Setup:</span>
1. Generated PAT in Azure DevOps (Code Read scope)
2. Stored PAT as Jenkins credential (Username+Password type)
3. Multi-branch Pipeline → Azure DevOps source
4. Webhook in Azure DevOps → Jenkins URL <span class="cmd">/azure-devops/hook</span>
5. Branch filter: <span class="cmd">main, develop, feature/*</span>

<span class="hl2">Challenges we hit:</span>
• Jenkins on private EC2 — webhook delivery failed. Fixed: exposed Jenkins via ALB with HTTPS
• PAT expiry caused silent build failures. Fixed: 90-day rotation reminder + Jenkins credential alert
• Branch names with slashes (feature/xyz) needed URL encoding in webhook payload`,
v2:`<span class="hl3">2023:</span>
• Switched to Azure DevOps Service Connections (OAuth) — no PAT expiry issues
• PR builds: auto-comment with SonarQube results in Azure DevOps PR review
• Branch protection: PRs to main require green Jenkins build before merge`,
tip:"Always mention webhook security: add a shared secret to validate payloads — prevents spoofed build triggers."},

{cat:"Jenkins",diff:"hard",
q:"How did you handle rollbacks? Walk through a real rollback scenario end to end.",
sub:"Focus: artifact versioning, DB migration safety, how fast was rollback",
v1:`<span class="hl2">Artifact strategy:</span>
Every successful build tagged: <span class="cmd">app-{GIT_SHA}-{BUILD_NUM}.tar.gz</span> → uploaded to S3.
S3 lifecycle: keep last 10 versions, delete older.

<span class="hl2">Rollback job:</span>
Parameterized Jenkins job — accepts VERSION input.
Ansible downloads that specific artifact from S3 and redeploys.

<span class="hl2">Real scenario (DB connection exhaustion):</span>
• Deploy at 01:50 AM introduced N+1 query bug
• Grafana alert at 02:14: <span class="cmd">mysql_connections > 150</span> (max 151), ALB 5XX at 40%
• CloudWatch Logs: "Too many connections" flooding
• Decision: rollback immediately while debugging in parallel
• Ansible rollback to previous artifact: 4 minutes
• Site recovered: 02:27 AM — 13 min total incident

<span class="hl2">DB migration safety:</span>
• Every migration had a matching rollback script
• Destructive changes (DROP COLUMN) → feature flagged, never reversed mid-deploy`,
v2:`<span class="hl3">2023 — Blue-Green on ECS:</span>
• Deploy to inactive ECS target group → health checks pass → swap ALB listener
• Rollback = swap listener back (seconds, not minutes)
• Zero traffic impact during swap`,
tip:"End the rollback story with 'what we changed to prevent recurrence' — load test stage added, alert threshold lowered. That's the senior answer.",
trap:"Saying 'we just reverted the git commit' is wrong. That doesn't redeploy anything. Show you know artifact-based rollback."},

{cat:"Jenkins",diff:"medium",
q:"What is SonarQube? What quality gates did you configure and what metrics did you track?",
sub:"Focus: specific thresholds, what triggered gate failure, how it blocked deploys",
v1:`<span class="hl">SonarQube</span> = static code analysis without running the code.

<span class="hl2">Metrics we tracked:</span>
• Bugs — logic defects (null dereference, unclosed streams)
• Vulnerabilities — OWASP-mapped issues (SQL injection risk, hardcoded credentials)
• Code Smells — maintainability (methods too long, duplications)
• Coverage — % of new code covered by tests
• Duplicated Lines %

<span class="hl2">Quality gate thresholds (on new code only):</span>
• New bugs: 0
• New critical/blocker vulnerabilities: 0
• Coverage on new code: ≥ 70%
• Duplicated lines on new code: &lt; 5%

<span class="hl2">Jenkins integration:</span>
<div class="code-block">stage('SonarQube') {
  steps {
    withSonarQubeEnv('SonarQube-Server') {
      sh 'sonar-scanner -Dsonar.projectKey=lms-app'
    }
  }
}
stage('Quality Gate') {
  steps { waitForQualityGate abortPipeline: true }
}</div>
If gate fails → build ABORTED → no artifact created → no deploy.`,
v2:`<span class="hl3">2023:</span>
• Branch analysis — each PR gets own SQ report, diff vs main shown in Azure DevOps PR comments
• Security hotspot review became a sprint ceremony, not just CI gate
• Added SAST findings to team KPI dashboard`,
tip:"Say 'quality gate on new code only' — SonarQube best practice. Fail on new problems, not legacy debt. Interviewers love this nuance."},

// ══ AWS ══
{cat:"AWS",diff:"medium",
q:"Explain the difference between EC2, ECS, and Lambda. When did you use each at TriByte?",
sub:"Focus: decision criteria, real usage examples, tradeoffs",
v1:`<div class="compare-grid">
<div class="compare-col"><h4>EC2</h4><p>Full VMs. You manage OS, patching, scaling.
Used for: Jenkins master/agents, PHP monolith (staging), Prometheus/Grafana server.
When: long-running stateful workloads.</p></div>
<div class="compare-col"><h4 class="g">ECS (Fargate)</h4><p>Managed containers. No EC2 node management.
Used for: microservices in UAT/prod. Each service = ECS task.
When: containerized, always-on services.</p></div>
</div>
<div class="compare-grid">
<div class="compare-col"><h4>Lambda</h4><p>Serverless functions. Event-driven.
Used for: S3 upload processing, SQS consumers, EventBridge scheduled jobs.
When: short-lived, bursty, event-triggered work.</p></div>
<div class="compare-col"><h4 class="g">Decision rule</h4><p>Always-on + stateful → EC2
Containerized service → ECS
Event-driven, &lt;15 min → Lambda</p></div>
</div>`,
v2:`<span class="hl3">2023 evolution:</span>
• Migrated EC2 Ansible-managed monolith → ECS Fargate (eliminated OS patching)
• Lambda → container image deployment (larger deps, same event-driven model)
• Graviton2 (ARM) EC2 instances for 20% cost reduction`,
tip:"Cold start is the Lambda gotcha — mention Provisioned Concurrency for latency-sensitive endpoints. Shows production awareness.",
trap:"Don't confuse ECS and EKS. ECS = AWS-native orchestration. EKS = managed Kubernetes. We used both for different complexity levels."},

{cat:"AWS",diff:"hard",
q:"How did you architect VPC networking? Walk through subnets, routing, NAT, security groups.",
sub:"Focus: why private/public separation, actual CIDR ranges, SG vs NACL difference",
v1:`<span class="hl2">VPC per environment (Staging, UAT, Prod = 3 separate VPCs):</span>
CIDR: <span class="cmd">10.0.0.0/16</span> each (65k IPs)

<span class="hl2">Subnet layout (2 AZs for HA):</span>
• Public:  <span class="cmd">10.0.1.0/24</span>, <span class="cmd">10.0.2.0/24</span>  → ALB, NAT Gateway, Bastion
• Private: <span class="cmd">10.0.10.0/24</span>, <span class="cmd">10.0.11.0/24</span> → EC2 app, ECS tasks
• DB:      <span class="cmd">10.0.20.0/24</span>, <span class="cmd">10.0.21.0/24</span> → RDS only (no outbound route)

<span class="hl2">Routing:</span>
• Public subnet: <span class="cmd">0.0.0.0/0 → Internet Gateway</span>
• Private subnet: <span class="cmd">0.0.0.0/0 → NAT Gateway</span> (NAT is in public subnet!)
• DB subnet: no default route — completely isolated

<span class="hl2">Security Groups (stateful, resource-level):</span>
• ALB SG: 443 from 0.0.0.0/0
• App SG: 8080 from ALB SG only (not internet)
• DB SG: 3306 from App SG only

<span class="hl2">NACLs (stateless, subnet-level):</span>
• Additional layer blocking known malicious IP ranges
• Must allow BOTH inbound AND outbound (stateless = no auto return traffic)`,
v2:`<span class="hl3">2023:</span>
• VPC Flow Logs → CloudWatch for network audit + anomaly detection
• VPC Endpoints for S3, DynamoDB — traffic stays on AWS backbone (no NAT cost)
• VPC Peering between environments for shared auth service`,

    "ecs:UpdateService",

  "Resource": "arn:aws:ecs:ap-south-1:ACCOUNT_ID:service/cluster/*"
}</div>

<span class="cmd">ERROR</span> pattern on app log group → custom metric → alarm on count &gt; 50 per min`,

{cat:"AWS",diff:"hard",
q:"How did you use SQS? Difference between Standard and FIFO queues? DLQ pattern?",
sub:"Focus: actual use case, DLQ config, idempotency requirement",
v1:`<span class="hl2">SQS use case — async job decoupling:</span>
User requests heavy report → API responds 202 immediately → message in SQS → worker processes → DB updated → user notified.

<span class="hl2">Queue settings:</span>
• Visibility timeout: 60s (= max processing SLA)
• Message retention: 4 days
• Long polling: WaitTimeSeconds=20 (reduces empty polls, saves cost)
• Max receive count: 3 → then moves to DLQ

<span class="hl2">Dead Letter Queue:</span>
• Separate SQS queue captures messages failed 3+ times
• CloudWatch alarm: DLQ ApproximateNumberOfMessages &gt; 0 → immediate alert
• Ops inspects DLQ messages to identify bug pattern

<div class="compare-grid">
<div class="compare-col"><h4>Standard Queue</h4><p>At-least-once delivery
Best-effort ordering
Unlimited throughput
Used for: reports, emails, file processing</p></div>
<div class="compare-col"><h4 class="g">FIFO Queue</h4><p>Exactly-once delivery
Strict ordering guaranteed
300 TPS (3000 with batching)
Used for: payment events, order sequences</p></div>
</div>`,

• Lambda SQS event source mapping — auto-scales consumers based on queue depth
• SNS → multiple SQS fan-out pattern (one event → multiple consumers)
• Batch size tuning: Lambda batch=10, concurrency=5 for throughput optimization`,

v1:`<span class="hl">Problem:</span> Build tools (compilers, dev deps) shouldn't be in production images.

<span class="hl2">Multi-stage build example (Node.js):</span>
<div class="code-block">## Stage 1: Build
FROM node:18-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci
COPY . .
RUN npm run build    # compile TypeScript, bundle

## Stage 2: Runtime (minimal)
FROM node:18-alpine AS runtime
WORKDIR /app
COPY --from=builder /app/dist ./dist
COPY --from=builder /app/node_modules ./node_modules
EXPOSE 3000
USER node            # non-root
CMD ["node", "dist/index.js"]</div>

<span class="hl2">Impact:</span>
• Image size: 1.2GB → 180MB (stripped dev deps, build tools, typescript compiler)
• No compiler in prod = smaller attack surface
• Faster ECS task launch (smaller image pull)

<span class="hl2">PHP example:</span>
<div class="code-block">FROM composer:2 AS deps
COPY composer.json composer.lock ./
RUN composer install --no-dev --optimize-autoloader

FROM php:8.1-fpm-alpine AS runtime
COPY --from=deps /app/vendor ./vendor
COPY . .
USER www-data</div>`,
v2:`<span class="hl3">2023:</span>
• BuildKit cache mounts: <span class="cmd">RUN --mount=type=cache,target=/root/.npm npm ci</span> → 60% faster builds
• ECR image scanning (Trivy) in pipeline → block deploy on HIGH CVEs
• Moved to <span class="cmd">node:18-alpine</span> + some services to distroless (no shell, minimal OS)`,

{cat:"Docker/K8s",diff:"hard",
q:"Walk through what happens internally when you run kubectl apply. From API call to running container.",
sub:"Focus: API server, etcd, controller manager, scheduler, kubelet sequence",
v1:`<span class="hl2">Full sequence:</span>

1. <span class="hl">kubectl apply -f deployment.yaml</span>
   → Sends REST request to <span class="cmd">kube-apiserver</span> with auth (RBAC check)

2. <span class="hl">API Server → etcd</span>
   → Validates manifest (schema), stores desired state in etcd

3. <span class="hl">Deployment Controller</span> (part of controller-manager)
   → Watches etcd, sees desired=3 pods, actual=0
   → Creates 3 Pod objects in etcd (status: Pending, no node assigned)

4. <span class="hl">Scheduler</span>
   → Watches for unscheduled pods
   → Scores nodes based on: available CPU/memory, taints, affinity rules
   → Assigns best node → writes nodeName to pod spec in etcd

5. <span class="hl">Kubelet</span> (on assigned node)
   → Watches API server for pods assigned to its node
   → Pulls image from ECR via containerd (CRI)
   → Starts container, sets up networking
   → Reports status: Running → API server → etcd

6. <span class="hl">kube-proxy</span>
   → Updates iptables/IPVS on all nodes for Service routing to new pod IP`,
v2:`<span class="hl3">Additions we configured:</span>
• Pod Disruption Budgets — prevent evicting all pods during node drain
• Priority Classes — critical services preempt lower-priority pods during resource pressure
• Resource quotas per namespace — client isolation`,
tip:"This shows you understand K8s internals, not just kubectl commands. Most candidates stop at 'the scheduler assigns it'. Going deeper = senior signal.",
trap:"etcd stores DESIRED state. Kubelet reports ACTUAL state. The reconciliation loop bridges the gap — this is the core K8s philosophy. Know this."},

{cat:"Docker/K8s",diff:"medium",
q:"What are Kubernetes Liveness vs Readiness probes? How did you configure them?",
sub:"Focus: exact difference, what happens on failure, real YAML config",
v1:`<div class="compare-grid">
<div class="compare-col"><h4>Readiness Probe</h4><p>"Ready to receive traffic?"
FAIL → removed from Service endpoints (no traffic routed)
Pod stays running, just excluded from LB.
Use: DB connection check, cache check, dependencies ready.</p></div>
<div class="compare-col"><h4 class="g">Liveness Probe</h4><p>"Still alive?"
FAIL (after failureThreshold) → kubelet KILLS + RESTARTS container
Use: detect stuck/deadlocked processes, memory leaks.</p></div>
</div>
<span class="hl2">Our YAML config:</span>
<div class="code-block">livenessProbe:
  httpGet:
    path: /health    # just: return 200 (process alive)
    port: 8080
  initialDelaySeconds: 30   # wait for app startup
  periodSeconds: 10
  failureThreshold: 3        # 3 fails = container restart

readinessProbe:
  httpGet:
    path: /ready     # checks: DB conn, Redis conn, deps
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 2        # 2 fails = remove from LB</div>

<span class="hl2">Our endpoints:</span>
• <span class="cmd">/health</span> → just returns 200 (is the process alive?)
• <span class="cmd">/ready</span> → checks DB pool, cache connection (am I ready to serve?)`,
v2:`<span class="hl3">2023 addition — Startup Probe:</span>
For slow-starting apps (Java services taking 60+ sec to start):
<div class="code-block">startupProbe:
  httpGet: { path: /health, port: 8080 }
  failureThreshold: 30
  periodSeconds: 5   # allow up to 150s startup</div>
Liveness probe disabled until startup probe passes — prevents premature restart loops.`,
tip:"KEY: Readiness failure = stop routing traffic. Liveness failure = restart container. Failing readiness does NOT restart. Get this crystal clear.",
trap:"initialDelaySeconds too short = liveness probe kills app before it starts = infinite restart loop. Set it longer than your worst-case startup time."},

{cat:"Docker/K8s",diff:"medium",
q:"What is Helm and why did you use it over raw Kubernetes YAML?",
sub:"Focus: real problems Helm solved, values override pattern, rollback",
v1:`<span class="hl">Problem with raw YAML:</span>
6 client projects × (deployment + service + ingress + configmap + hpa) = 30+ YAML files.

├── Chart.yaml           # chart name, version, dependencies
├── values.yaml          # defaults
├── values-staging.yaml  # staging overrides
├── values-prod.yaml     # prod overrides
└── templates/

    ├── service.yaml
    ├── ingress.yaml

<span class="hl2">Deploy command:</span>
<span class="cmd">helm upgrade --install my-app ./my-app -f values-prod.yaml --set image.tag=abc123</span>

<span class="hl2">Benefits:</span>
• Single chart parameterizes staging + prod (different replicas, resources, ingress hosts)
• <span class="cmd">helm rollback my-app 2</span> — instant rollback to revision 2
• <span class="cmd">helm history my-app</span> — full deploy audit trail with timestamps`,
v2:`<span class="hl3">2023:</span>
• Helmfile for declarative multi-chart management across environments
• OCI chart storage in ECR — versioned, immutable chart releases
• Chart dependencies: shared ingress-nginx + cert-manager charts`,

{cat:"Terraform",diff:"hard",
q:"What is Terraform state? What happens when it drifts? How do you fix it?",
sub:"Focus: state file role, drift causes, terraform import, state commands",
v1:`<span class="hl">Terraform state</span> (<span class="cmd">terraform.tfstate</span>) maps Terraform config → real AWS resources.

<span class="hl2">Why critical:</span>
• Terraform uses state to know: what exists, what to create, what to change, what to delete
• Without state = tries to recreate everything = disaster

<span class="hl2">Drift causes in our env:</span>
• Someone added SG rule manually in console ("just temporary")
• Infrastructure created via AWS CLI not captured in Terraform
• Another team provisioned resources without TF

<span class="hl2">How we detected drift:</span>
• <span class="cmd">terraform plan</span> run daily in CI — any diff = drift alert
• AWS Config rules: alert on manual SG, S3 bucket policy changes

<span class="hl2">Fix strategies:</span>
<span class="hl">Re-apply</span>: Accept TF as truth, apply removes/reverts manual changes.
<span class="hl">Update .tf</span>: Accept manual change, add it to .tf file, plan shows no diff.
<span class="hl">terraform import</span>: Resource created outside TF → bring under management:
<span class="cmd">terraform import aws_instance.app i-0abc12345</span>

<span class="hl2">State manipulation commands:</span>
• <span class="cmd">terraform state rm</span> — stop managing resource (doesn't delete it in AWS)
• <span class="cmd">terraform state mv</span> — rename resource after code refactor`,
v2:`<span class="hl3">2023:</span>
• <span class="cmd">terraform apply -refresh-only</span> — refresh state from real AWS without applying changes
• Driftctl tool — generates full drift report across all resources
• Team policy: any manual change must have a TF commit within 24h`,
tip:"'terraform import' impresses interviewers — many engineers don't know it. Shows maturity with real-world environments where not everything was TF from day one.",
trap:"<span class=\"cmd\">terraform state rm</span> does NOT delete the AWS resource. It just makes TF forget about it. Resource keeps running. This is a common interview trap."},

{cat:"Python",diff:"medium",
q:"How did you use Boto3 for AWS automation? Give a concrete example with error handling.",
sub:"Focus: actual code pattern, pagination, IAM permissions needed",
v1:`<span class="hl2">Example: Cleanup old S3 build artifacts:</span>
<div class="code-block">import boto3
from datetime import datetime, timezone, timedelta

s3 = boto3.client('s3', region_name='ap-south-1')
bucket = 'artifacts-bucket'
prefix = 'app/staging/'
cutoff = datetime.now(timezone.utc) - timedelta(days=30)

paginator = s3.get_paginator('list_objects_v2')
deleted = 0
for page in paginator.paginate(Bucket=bucket, Prefix=prefix):
    for obj in page.get('Contents', []):
        if obj['LastModified'] &lt; cutoff:
            try:
                s3.delete_object(Bucket=bucket, Key=obj['Key'])
                print(f"Deleted: {obj['Key']}")
                deleted += 1
            except s3.exceptions.NoSuchKey:
                pass  # already gone
            except Exception as e:
                print(f"Error deleting {obj['Key']}: {e}")

print(f"Cleaned up {deleted} artifacts")</div>

<span class="hl2">Other boto3 automations we built:</span>
• EC2 start/stop scheduler (EventBridge → Lambda → boto3)
• RDS snapshot: create on deploy, cleanup snapshots older than 7 days
• SQS producer/consumer for job queue
• CloudWatch log export to S3 for compliance archive`,
v2:`<span class="hl3">2023:</span>
• Lambda Powertools for structured logging: <span class="cmd">from aws_lambda_powertools import Logger, Tracer</span>
• async boto3 (<span class="cmd">aioboto3</span>) for concurrent S3 operations in Lambda
• Moved repeated scripts to Lambda + EventBridge scheduled rules`,

{cat:"Python",diff:"medium",
q:"Explain Python decorators, generators, and context managers with DevOps-relevant examples.",
sub:"Focus: practical usage you've actually done, not textbook definitions",
v1:`<span class="hl2">Decorators — function wrappers for cross-cutting concerns:</span>
<div class="code-block">import functools, time

def retry(max_attempts=3, delay=2):
    def decorator(func):
        @functools.wraps(func)
        def wrapper(*args, **kwargs):
            for attempt in range(max_attempts):
                try:
                    return func(*args, **kwargs)
                except Exception as e:
                    if attempt == max_attempts - 1: raise
                    print(f"Attempt {attempt+1} failed: {e}, retrying...")
                    time.sleep(delay)
        return wrapper
    return decorator

@retry(max_attempts=5, delay=3)
def call_aws_api():
    # AWS calls fail transiently — retry is essential
    return boto3.client('ec2').describe_instances()</div>

<span class="hl2">Generators — memory-efficient streaming:</span>
<div class="code-block">def stream_s3_objects(bucket, prefix):
    paginator = s3.get_paginator('list_objects_v2')
    for page in paginator.paginate(Bucket=bucket, Prefix=prefix):
        for obj in page.get('Contents', []):
            yield obj   # one at a time — doesn't load all into memory</div>

<span class="hl2">Context managers — guaranteed cleanup:</span>
<div class="code-block">from contextlib import contextmanager

@contextmanager
def db_connection():
    conn = get_db()
    try:
        yield conn
    finally:
        conn.close()   # always runs, even on exception

with db_connection() as db:
    db.execute("SELECT * FROM users")</div>`,
v2:`<span class="hl3">2023:</span>
• Dataclasses for structured config objects (replacing plain dicts)
• Type hints: <span class="cmd">from typing import Generator, Iterator, Optional</span>
• asyncio + <span class="cmd">async with</span> for async context managers in Lambda`,
tip:"The retry decorator is the most real-world DevOps pattern here. AWS APIs fail transiently. Show this and you've shown Python beyond basics.",
trap:"Generators are consumed once. After exhaustion, iterating again yields nothing. Recreate the generator object if you need to iterate again."},

{cat:"Python",diff:"medium",
q:"How did you build the AI-assisted query auto-correction system? Walk through the architecture.",
sub:"Focus: problem → solution → how it worked → results",
v1:`<span class="hl2">Problem:</span>
LMS had dynamically generated SQL (from user-configured report builder). Some queries were invalid — wrong column names, type mismatches, syntax errors. Users saw error pages.

<span class="hl2">Pipeline:</span>

<span class="hl">Step 1 — Capture:</span>
<div class="code-block">def execute_query(query, params):
    try:
        return db.execute(query, params)
    except pymysql.OperationalError as e:
        return auto_correct_and_retry(query, e)</div>

<span class="hl">Step 2 — AI Fix:</span>
<div class="code-block">def auto_correct_and_retry(query, error):
    prompt = f"""Fix this SQL query.
Error: {str(error)}
Schema: {get_schema_summary()}
Query: {query}
Return only the fixed SQL. No explanation."""

    response = anthropic_client.messages.create(
        model="claude-3-haiku",
        max_tokens=500,
        messages=[{"role": "user", "content": prompt}]
    )
    fixed_query = extract_sql(response.content[0].text)</div>

<span class="hl">Step 3 — Validate:</span>
Run <span class="cmd">EXPLAIN {fixed_query}</span> — if no MySQL error, syntactically valid.

<span class="hl">Step 4 — Track:</span>
Log (original_query, error, fixed_query, success) → weekly report on most common failures → fix permanently in report builder.

<span class="hl2">Outcome:</span> 90%+ of transient query failures auto-resolved without user-visible error.`,
v2:`<span class="hl3">2023 improvements:</span>
• Few-shot prompting — include 3 example correct queries from same schema in prompt
• Cache common fix patterns — skip API call for repeated error types
• Slack notification for uncorrectable queries → human review queue`,
tip:"Frame this as a 'self-healing system with a feedback loop'. Interviewers remember unique, impactful projects. This is yours."},

// ══ NODE.JS ══
{cat:"NodeJS",diff:"medium",
q:"Explain the Node.js event loop. Why does it matter for your LMS backend services?",
sub:"Focus: single-thread + async, what breaks it, how you worked around it",
v1:`<span class="hl">Node.js is single-threaded</span> but handles massive concurrency via non-blocking async I/O.

<span class="hl2">Event loop phases:</span>
<div class="code-block">1. timers          → setTimeout/setInterval callbacks
2. pending callbacks → deferred I/O callbacks
3. idle/prepare    → internal
4. poll            → wait for new I/O events (here when idle)
5. check           → setImmediate callbacks
6. close callbacks → socket close events</div>

<span class="hl2">Why single-thread works for I/O:</span>
DB query sent → Node doesn't wait → handles other requests → callback fires when DB responds.
Works perfectly for I/O-bound work (APIs, DB, file reads).
Fails for CPU-bound work (video encoding, heavy crypto) — blocks entire loop.

<span class="hl2">How we used this in LMS backend:</span>
• Parallel DB queries with <span class="cmd">Promise.all()</span>:
<div class="code-block">// Sequential (bad): 3 × 50ms = 150ms total
const user    = await getUser(userId);
const courses = await getCourses(userId);
const progress = await getProgress(userId);

// Parallel (good): max(50ms, 50ms, 50ms) = 50ms total
const [user, courses, progress] = await Promise.all([
  getUser(userId),
  getCourses(userId),
  getProgress(userId)
]);</div>
• Heavy CPU jobs (PDF reports) → pushed to SQS → Lambda (off the event loop)`,
v2:`<span class="hl3">2023:</span>
• Worker Threads for CPU-bound tasks (kept off main thread)
• <span class="cmd">AsyncLocalStorage</span> for request-scoped trace IDs through async callbacks
• Node 18 native fetch (dropped axios for simple cases)`,
tip:"Promise.all for parallel queries is the single highest-impact optimization. '3 sequential 50ms queries → 1 parallel 50ms result' is a clear, concrete win.",
trap:"CPU-intensive code in Node (heavy loops, image processing) blocks the event loop — all other requests wait. ALWAYS offload to workers or a separate service."},

{cat:"Database",diff:"medium",
q:"How did you manage MySQL on AWS RDS in production? Backups, scaling, connection pooling.",
sub:"Focus: RDS-specific features, connection limits, Multi-AZ vs Read Replica",
v1:`<span class="hl2">RDS setup:</span>
• Staging: <span class="cmd">db.t3.medium</span> — cost-optimized
• Production: <span class="cmd">db.r5.large</span> — memory-optimized (8GB RAM, better for MySQL buffer pool)
• Multi-AZ: enabled on prod — synchronous standby replica, automatic failover (~60s)
• Storage: gp3 SSD, autoscaling (started 100GB → auto-grows, no manual intervention)

<span class="hl2">Backup strategy:</span>
• Automated daily snapshots (3 AM UTC) — 7-day retention
• Manual snapshot before every major deployment
• Point-in-time recovery tested quarterly (actually restore to verify it works)

<span class="hl2">Connection pooling (Node.js):</span>
<div class="code-block">const pool = mysql2.createPool({
  host: process.env.DB_HOST,
  connectionLimit: 10,
  waitForConnections: true,
  queueLimit: 50
});
// Always release connections:
const conn = await pool.getConnection();
try { /* queries */ } finally { conn.release(); }</div>

<span class="hl2">PHP: PDO with persistent connections + explicit close in finally block.</span>`,
v2:`<span class="hl3">2023 critical addition — RDS Proxy:</span>
Lambda was creating new DB connections per invocation (100 concurrent Lambdas = 100 new connections → MySQL max_connections hit).
RDS Proxy pools and reuses connections — Lambda talks to proxy, not RDS directly.
Result: connection count went from 80+ to 8 stable.

Also added: Read Replica for reporting queries (offload heavy SELECTs from primary).`,
tip:"RDS Proxy for Lambda is a common 2023 story — Lambda connection explosion is a real production problem. Knowing the solution = senior AWS knowledge.",
trap:"Multi-AZ = high availability (failover). Read Replica = read scaling. They're different things. Interviewers test this. Don't say Multi-AZ for performance."},

{cat:"Database",diff:"hard",
q:"How did you run database migrations safely with zero downtime in production?",
sub:"Focus: ALTER TABLE locking, expand-contract pattern, rollback plan",
v1:`<span class="hl2">The problem:</span>
<span class="cmd">ALTER TABLE users ADD COLUMN phone VARCHAR(20)</span> on a 2M row table → table locks for 8+ minutes → production down.

<span class="hl2">Solution 1: Expand-Contract Pattern (for non-breaking changes)</span>

<span class="hl">Phase 1 — Expand:</span> Add new column, keep old column. Deploy code that writes to BOTH.
<span class="hl">Phase 2 — Backfill:</span> Migrate old data in small batches (not one big UPDATE):
<div class="code-block">-- Batched backfill (safe, doesn't lock long)
UPDATE users
SET phone = old_phone
WHERE phone IS NULL
  AND id BETWEEN ? AND ?
LIMIT 1000;</div>
<span class="hl">Phase 3 — Contract:</span> Remove old column after all rows have new value.

<span class="hl2">Solution 2: pt-online-schema-change (Percona tool)</span>
<div class="code-block">pt-osc --alter "ADD INDEX idx_email(email)" \
       --execute D=mydb,t=users</div>
Creates shadow table, copies rows in chunks, swaps atomically. No production lock.

<span class="hl2">Solution 3: Feature flags for schema changes</span>
Deploy new code with feature OFF → run migration → turn feature ON.

<span class="hl2">Versioning:</span>
SQL files numbered sequentially: <span class="cmd">V001__add_phone_to_users.sql</span>
Flyway tracks which scripts have run (migration history table in DB).`,
v2:`<span class="hl3">2023:</span>
• Always-paired rollback scripts (V001__add_phone.sql + V001__rollback.sql)
• Pre-deploy mandatory: run migration in staging, EXPLAIN ANALYZE heavy queries, verify performance`,
tip:"Expand-Contract pattern is the senior-level answer. Most candidates say 'we ran ALTER TABLE'. Show you thought about table locks.",
trap:"You cannot easily rollback DROP COLUMN — data is gone. Never DROP in prod without a migration window or feature flag protecting the code change first."},

• PHP: PDO prepared statements everywhere — zero raw string interpolation into SQL
• Node.js: <span class="cmd">helmet()</span> middleware (CSP, HSTS, X-Frame-Options, XSS-Protection headers)
• Rate limiting on auth endpoints: 5 attempts / 15 min per IP
• All secrets in AWS Secrets Manager (never .env files on servers)
• HTTPS only: ALB handles TLS termination, ACM cert, HTTP→HTTPS redirect

• Non-root USER in all Dockerfiles
• .dockerignore excludes .env, .git, node_modules
• ECR image scanning on push`,

        </div>
        <div class="q-right">
          <span class="diff-badge ${dc}">${item.diff}</span>
          <span class="cat-tag ${tag}">${item.cat}</span>
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="answer-section">
        <div class="version-tabs">
          <div class="vtab active" onclick="switchTab(this,'v1')">📅 2022 — How I built it</div>
          ${item.v2 ? `<div class="vtab v2023" onclick="switchTab(this,'v2')">🚀 2023+ — What evolved</div>` : ''}
        </div>
        <div class="answer-content visible" data-ver="v1">
          <div class="answer-text">${item.v1}</div>
          ${item.tip ? `<div class="tip-box">${item.tip}</div>` : ''}
          ${item.trap ? `<div class="trap-box">${item.trap}</div>` : ''}
        </div>
        ${item.v2 ? `<div class="answer-content" data-ver="v2"><div class="answer-text">${item.v2}</div></div>` : ''}
      </div>`;
    grid.appendChild(card);
  });

  updateBar();
}

function toggleCard(idx) {
  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  if (!card) return;
  if (openCards.has(idx)) { openCards.delete(idx); card.classList.remove('open'); }
  else { openCards.add(idx); card.classList.add('open'); }
  updateBar();
}

function switchTab(tab, ver) {
  const section = tab.closest('.answer-section');
  section.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  section.querySelectorAll('.answer-content').forEach(c => {
    c.classList.remove('visible');
    if (c.dataset.ver === ver) c.classList.add('visible');
  });
}

function updateBar() {
  const cards = document.querySelectorAll('.card');
  const opened = [...cards].filter(c => c.classList.contains('open')).length;
  document.getElementById('bar-count').textContent = `${opened} / ${cards.length}`;
  document.getElementById('bar-fill').style.width = cards.length ? `${(opened/cards.length)*100}%` : '0%';
}

function toggleAll() {
  allOpen = !allOpen;
  document.querySelectorAll('.card').forEach(c => {
    const idx = parseInt(c.dataset.idx);
    if (allOpen) { c.classList.add('open'); openCards.add(idx); }
    else { c.classList.remove('open'); openCards.delete(idx); }
  });
  document.getElementById('expand-btn').textContent = allOpen ? 'Collapse All' : 'Expand All';
  updateBar();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    allOpen = false;
    document.getElementById('expand-btn').textContent = 'Expand All';
    buildCards();
  });
});

function filterSearch() {
  searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  buildCards();
}

buildCards();
</script>
</body>
</html>
