<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Services — How to Create Each One</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090f;
  --bg2: #111118;
  --bg3: #18181f;
  --card: #1a1a24;
  --card-h: #1f1f2c;
  --border: #2a2a3a;
  --border2: #353548;
  --text: #e8e8f0;
  --muted: #7878a0;
  --hint: #4a4a68;
  --orange: #ff8c00;
  --orange2: #ffa940;
  --blue: #4dabf7;
  --green: #51cf66;
  --purple: #9775fa;
  --teal: #38d9a9;
  --pink: #f783ac;
  --red: #ff6b6b;
  --yellow: #ffd43b;
  --code-bg: #0d0d14;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────── */
.site-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 60px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -.3px;
  flex-shrink: 0;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--orange);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo span { color: var(--orange); }

.search-bar {
  flex: 1;
  max-width: 380px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px 8px 36px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-bar input:focus { border-color: var(--orange); }
.search-bar input::placeholder { color: var(--hint); }
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--hint);
  font-size: 14px;
  pointer-events: none;
}

.cat-filters {
  display: flex;
  gap: 6px;
  margin-left: auto;
  flex-wrap: wrap;
}
.cf {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: .3px;
  transition: all .15s;
  font-family: 'Syne', sans-serif;
}
.cf:hover { color: var(--text); border-color: var(--border2); }
.cf.on { background: var(--orange); color: #000; border-color: var(--orange); }

/* ── HERO ────────────────────────────────── */
.hero {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 48px 32px 40px;
  text-align: center;
}
.hero-eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  background: rgba(255,140,0,.1);
  border: 1px solid rgba(255,140,0,.25);
  border-radius: 20px;
  padding: 4px 14px;
  margin-bottom: 16px;
}
.hero h1 {
  font-size: clamp(26px, 5vw, 44px);
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 12px;
}
.hero h1 em { color: var(--orange); font-style: normal; }
.hero p {
  color: var(--muted);
  font-size: 15px;
  max-width: 560px;
  margin: 0 auto 24px;
}
.stat-row {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 800; color: var(--orange); }
.stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

/* ── MAIN LAYOUT ────────────────────────── */
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

.section-group { margin-bottom: 48px; }
.group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.group-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.group-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.group-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--hint);
  font-family: 'JetBrains Mono', monospace;
}

/* ── SERVICE CARD ───────────────────────── */
.svc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s;
}
.svc-card:hover { border-color: var(--border2); }
.svc-card.active { border-color: var(--orange); }

.card-trigger {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.svc-icon-wrap {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.svc-info { flex: 1; min-width: 0; }
.svc-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.svc-tagline {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.svc-badges { display: flex; gap: 5px; align-items: center; }
.badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
  padding: 3px 8px;
  border-radius: 5px;
}
.badge-free { background: rgba(81,207,102,.12); color: var(--green); border: 1px solid rgba(81,207,102,.25); }
.badge-paid { background: rgba(255,212,59,.1); color: var(--yellow); border: 1px solid rgba(255,212,59,.2); }
.card-arrow {
  color: var(--hint);
  font-size: 12px;
  transition: transform .2s;
  flex-shrink: 0;
}
.svc-card.active .card-arrow { transform: rotate(180deg); color: var(--orange); }

/* ── EXPANDED BODY ──────────────────────── */
.card-body {
  display: none;
  border-top: 1px solid var(--border);
}
.svc-card.active .card-body { display: block; }
.card-body-inner { padding: 20px 20px 24px; }

.what-is {
  background: var(--bg3);
  border-left: 3px solid var(--orange);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 20px;
}

.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── STEPS ──────────────────────────────── */
.steps-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 20px; }
.step-row { display: flex; gap: 12px; }
.step-left {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--orange);
  color: #000;
  font-size: 12px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-line {
  width: 1px;
  flex: 1;
  background: var(--border);
  margin: 4px 0;
  min-height: 12px;
}
.step-row:last-child .step-line { display: none; }
.step-content { flex: 1; padding-bottom: 16px; }
.step-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; margin-top: 4px; }
.step-detail { font-size: 12px; color: var(--muted); line-height: 1.6; }
.step-detail strong { color: var(--text); font-weight: 600; }
.step-note {
  display: inline-block;
  margin-top: 6px;
  font-size: 11px;
  background: rgba(255,140,0,.08);
  border: 1px solid rgba(255,140,0,.2);
  color: var(--orange2);
  padding: 4px 10px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── CODE ───────────────────────────────── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.code-fname { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.copy-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  transition: all .15s;
}
.copy-btn:hover { color: var(--text); border-color: var(--border2); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }
pre {
  padding: 14px 16px;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  line-height: 1.8;
  color: #c9d1d9;
}
.kw { color: #ff79c6; }
.str { color: #f1fa8c; }
.cm { color: #555577; font-style: italic; }
.fn { color: #50fa7b; }
.val { color: #bd93f9; }
.ky { color: #8be9fd; }
.num { color: #ffb86c; }

/* ── TIPS ───────────────────────────────── */
.tips-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.tip-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.tip-head {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
.tip-body { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── CONSOLE PATH ───────────────────────── */
.console-path {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 12px;
}
.path-step { color: var(--muted); }
.path-arrow { color: var(--hint); }
.path-step.active-path { color: var(--orange); font-weight: 700; }

/* ── HIDDEN / SEARCH ────────────────────── */
.svc-card.hidden { display: none; }
.section-group.empty { display: none; }

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 680px) {
  .site-header { padding: 0 16px; }
  .cat-filters { display: none; }
  .hero { padding: 32px 16px; }
  .page { padding: 20px 16px 60px; }
  .tips-grid { grid-template-columns: 1fr; }
  .stat-row { gap: 20px; }
}

/* ── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">☁</div>
      AWS <span>Services</span> Guide
    </div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search services... (e.g. S3, database, auth)" oninput="filterAll()">
    </div>
    <div class="cat-filters" id="cat-filters"></div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">End-to-End AWS Project</div>
  <h1>How to Create <em>Every</em><br>AWS Service — Step by Step</h1>
  <p>Click any service to see the exact console steps, AWS CLI commands, configuration tips, and best practices.</p>
  <div class="stat-row">
    <div class="stat"><div class="stat-num">24</div><div class="stat-label">Services Covered</div></div>
    <div class="stat"><div class="stat-num">6</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num">100+</div><div class="stat-label">Step-by-Step Instructions</div></div>
    <div class="stat"><div class="stat-num">FREE</div><div class="stat-label">14 Free Tier Services</div></div>
  </div>
</div>

<!-- MAIN -->
<div class="page" id="page"></div>

<script>
const CATS = {
  "Networking":  { color: "#4dabf7", dot: "#4dabf7" },
  "Compute":     { color: "#ffd43b", dot: "#ffd43b" },
  "Storage":     { color: "#51cf66", dot: "#51cf66" },
  "Database":    { color: "#f783ac", dot: "#f783ac" },
  "Auth & Security": { color: "#9775fa", dot: "#9775fa" },
  "Messaging":   { color: "#38d9a9", dot: "#38d9a9" },
  "API":         { color: "#ff8c00", dot: "#ff8c00" },
  "Containers":  { color: "#ff6b6b", dot: "#ff6b6b" },
  "CI/CD":       { color: "#cc5de8", dot: "#cc5de8" },
  "Monitoring":  { color: "#74c0fc", dot: "#74c0fc" },
};

const SERVICES = [

/* ════════════════ NETWORKING ════════════════ */
{ cat:"Networking", icon:"🏗️", bg:"rgba(77,171,247,.12)", name:"VPC", full:"Virtual Private Cloud", tagline:"Your private network — foundation of everything", free:true,
  what:"VPC is the very first resource you create. It's your isolated private network in AWS. Every EC2, RDS, Lambda, and ECS resource lives inside it. Think of it as your own data center in the cloud — you control all IP ranges, subnets, routing, and firewalls.",
  console:["AWS Console","VPC","Your VPCs","Create VPC"],
  steps:[
    {t:"Open VPC Console",d:"Search 'VPC' in AWS Console → click <strong>Your VPCs</strong> → click <strong>Create VPC</strong> (top-right orange button).",n:""},
    {t:"Choose 'VPC and more'",d:"Select the <strong>'VPC and more'</strong> option — this automatically creates subnets, route tables, and internet gateway for you in one click.",n:""},
    {t:"Set name and CIDR",d:"Name tag auto-generation: <strong>taskapp</strong>. IPv4 CIDR block: <strong>10.0.0.0/16</strong> (gives 65,536 IPs for all your resources).",n:"10.0.0.0/16"},
    {t:"Choose Availability Zones",d:"Number of AZs: <strong>2</strong> (always use at least 2 for high availability). Number of public subnets: <strong>2</strong>. Number of private subnets: <strong>2</strong>.",n:""},
    {t:"NAT Gateways",d:"For development: choose <strong>None</strong> to save $32/month. For production: choose <strong>1 per AZ</strong>. NAT allows private subnet resources to reach the internet.",n:""},
    {t:"VPC Endpoints",d:"Tick <strong>S3 Gateway</strong> endpoint — this allows EC2 and Lambda to access S3 without going through NAT (saves cost and improves speed).",n:"Free — always enable"},
    {t:"Click Create VPC",d:"AWS creates VPC + 4 subnets + 2 route tables + Internet Gateway + security group all in one shot. Done in ~30 seconds.",n:""},
  ],
  cli:`aws ec2 create-vpc \\
  --cidr-block 10.0.0.0/16 \\
  --tag-specifications \\
    'ResourceType=vpc,Tags=[{Key=Name,Value=taskapp-vpc}]'`,
  tips:[
    {h:"CIDR Planning",b:"VPC: 10.0.0.0/16. Public subnets: 10.0.1.0/24, 10.0.2.0/24. Private subnets: 10.0.3.0/24, 10.0.4.0/24"},
    {h:"Security Groups",b:"SGs are stateful — allow inbound port 3000 from ALB SG only. Never open 0.0.0.0/0 except on ALB port 80/443"},
    {h:"Two AZs = HA",b:"Always deploy across 2 AZs. Single-AZ means a data center failure takes down your whole app"},
    {h:"VPC Endpoints",b:"Add S3 + DynamoDB gateway endpoints = free. Avoids NAT Gateway data processing charges for those services"},
  ]
},

{ cat:"Networking", icon:"⚖️", bg:"rgba(77,171,247,.12)", name:"ALB", full:"Application Load Balancer", tagline:"Layer-7 load balancer for HTTP/HTTPS traffic", free:false,
  what:"The Application Load Balancer sits in your public subnets and distributes incoming HTTPS traffic across your EC2 instances or ECS tasks. It handles SSL termination (so your backend gets plain HTTP), health checks, path-based routing, and sticky sessions.",
  console:["EC2","Load Balancers","Create load balancer","Application Load Balancer"],
  steps:[
    {t:"Open EC2 → Load Balancers",d:"EC2 Console → left sidebar → <strong>Load Balancers</strong> → <strong>Create load balancer</strong> → choose <strong>Application Load Balancer</strong>.",n:""},
    {t:"Basic configuration",d:"Name: <strong>taskapp-alb</strong>. Scheme: <strong>Internet-facing</strong>. IP address type: <strong>IPv4</strong>.",n:""},
    {t:"Network mapping",d:"VPC: select <strong>taskapp-vpc</strong>. Mappings: select both AZs and choose the <strong>public subnets</strong> (not private) in each AZ.",n:""},
    {t:"Security groups",d:"Create new SG: allow inbound <strong>HTTP port 80</strong> and <strong>HTTPS port 443</strong> from 0.0.0.0/0 (world). Allow outbound all.",n:""},
    {t:"Listeners and routing",d:"Add listener: HTTPS port 443 → create a Target Group. Target type: <strong>Instances</strong>. Protocol: HTTP. Port: 3000. Health check path: /health.",n:""},
    {t:"Add HTTP redirect",d:"Add another listener: HTTP port 80 → Action: <strong>Redirect to HTTPS</strong>. This forces all traffic to use HTTPS automatically.",n:""},
    {t:"Register targets",d:"In the Target Group, register your EC2 instances. ALB will health check them every 30s and only send traffic to healthy ones.",n:""},
  ],
  cli:`aws elbv2 create-load-balancer \\
  --name taskapp-alb \\
  --subnets subnet-pub1 subnet-pub2 \\
  --security-groups sg-alb \\
  --scheme internet-facing \\
  --type application`,
  tips:[
    {h:"SSL on ALB",b:"Terminate SSL at the ALB, not EC2. ALB decrypts and forwards plain HTTP to backend. Attach ACM cert to the 443 listener"},
    {h:"Health check path",b:"Create GET /health endpoint on your server that returns 200 OK. ALB uses this to detect unhealthy instances"},
    {h:"Sticky sessions",b:"Enable if your app has server-side sessions. Otherwise keep disabled for better load distribution"},
    {h:"WAF attachment",b:"Attach AWS WAF to the ALB to block SQL injection, XSS, and DDoS before traffic hits EC2"},
  ]
},

{ cat:"Networking", icon:"🔍", bg:"rgba(77,171,247,.12)", name:"Route 53", full:"Route 53 DNS", tagline:"Domain name system — connect your domain to AWS", free:false,
  what:"Route 53 is AWS's DNS service. It maps your domain name (e.g. taskapp.com) to your AWS resources (CloudFront distribution for frontend, ALB for backend). It also provides health checks and automatic failover.",
  console:["Route 53","Hosted zones","Create hosted zone"],
  steps:[
    {t:"Create Hosted Zone",d:"Route 53 → <strong>Hosted zones</strong> → <strong>Create hosted zone</strong>. Enter your domain (e.g. <strong>taskapp.com</strong>). Type: Public hosted zone.",n:"$0.50/month per zone"},
    {t:"Update domain nameservers",d:"Route 53 gives you 4 NS records (e.g. ns-1234.awsdns-01.com). Go to your domain registrar (GoDaddy/Namecheap) and replace their nameservers with these 4 AWS nameservers.",n:"Propagation: 5-48 hours"},
    {t:"Create A record for frontend",d:"In your hosted zone → <strong>Create record</strong>. Record name: www (or leave blank for apex). Type: <strong>A</strong>. Enable <strong>Alias</strong>. Route traffic to: CloudFront distribution.",n:""},
    {t:"Create A record for API",d:"Create another A record. Name: <strong>api</strong>. Alias → Route to: Application Load Balancer → select your ALB. This maps api.taskapp.com to your backend.",n:""},
    {t:"Create health checks",d:"Route 53 → Health checks → Create. Enter your ALB DNS name. Path: /health. If it fails, Route 53 can automatically failover to a backup.",n:""},
  ],
  cli:`aws route53 create-hosted-zone \\
  --name taskapp.com \\
  --caller-reference $(date +%s)

# Create A record aliasing to CloudFront
aws route53 change-resource-record-sets \\
  --hosted-zone-id ZONEID \\
  --change-batch file://dns-record.json`,
  tips:[
    {h:"Apex domain",b:"For root domain (taskapp.com without www), use Alias A record — regular CNAME can't point to apex. Route 53 supports it natively"},
    {h:"TTL strategy",b:"Set low TTL (60s) during initial setup. Once stable, increase to 300-3600s. Lower TTL = faster DNS propagation during changes"},
    {h:"Latency routing",b:"Use Latency routing policy to send users to the nearest AWS region automatically — great for global apps"},
    {h:"Failover routing",b:"Set primary record to your main ALB and secondary to a static S3 error page. Route 53 auto-switches if health check fails"},
  ]
},

/* ════════════════ COMPUTE ════════════════ */
{ cat:"Compute", icon:"🖥️", bg:"rgba(255,212,59,.1)", name:"EC2", full:"Elastic Compute Cloud", tagline:"Virtual machines — your main app server", free:true,
  what:"EC2 gives you virtual servers in the cloud. Your Node.js/Python Express backend runs here. You pick the OS (Amazon Linux 2023), size (t3.micro for Free Tier), and networking. EC2 instances live in your VPC private subnet and receive traffic from the ALB.",
  console:["EC2","Instances","Launch instances"],
  steps:[
    {t:"Open EC2 → Launch Instance",d:"EC2 Console → <strong>Instances</strong> → <strong>Launch instances</strong> (big orange button top-right).",n:""},
    {t:"Name and AMI",d:"Name: <strong>taskapp-server</strong>. AMI: <strong>Amazon Linux 2023</strong> (free, optimized for AWS, already has AWS CLI). Architecture: x86_64.",n:"Free Tier eligible"},
    {t:"Instance type",d:"Select <strong>t3.micro</strong> (2 vCPU, 1 GB RAM). Free Tier = 750 hours/month for 12 months. For production consider t3.small or t3.medium.",n:"t3.micro = FREE"},
    {t:"Key pair",d:"<strong>Create new key pair</strong> → name: taskapp-key → Type: RSA → Format: .pem → Download. Save it somewhere safe. You'll need this to SSH into the instance.",n:""},

    {t:"Storage",d:"Root volume: <strong>20 GB gp3</strong> (faster and cheaper than gp2). Tick <strong>Delete on termination</strong> for dev. For prod, uncheck to preserve data if instance is replaced.",n:""},

  cli:`aws ec2 run-instances \\
  --image-id ami-0c55b159cbfafe1f0 \\
  --instance-type t3.micro \\
  --key-name taskapp-key \\

{ cat:"Compute", icon:"⚡", bg:"rgba(255,212,59,.1)", name:"Lambda", full:"AWS Lambda", tagline:"Serverless functions — zero server management", free:true,
  what:"Lambda runs your code without you managing any servers. You pay only when code runs (first 1 million requests free every month forever). Use Lambda for: processing SQS messages, resizing S3 images, sending emails, scheduled jobs, and API Gateway handlers.",
  console:["Lambda","Functions","Create function"],
  steps:[
    {t:"Open Lambda → Create function",d:"Lambda Console → <strong>Functions</strong> → <strong>Create function</strong>. Choose <strong>Author from scratch</strong>.",n:""},
    {t:"Basic information",d:"Function name: <strong>taskapp-email-worker</strong>. Runtime: <strong>Node.js 20.x</strong>. Architecture: x86_64.",n:""},
    {t:"Permissions",d:"Execution role: <strong>Create a new role with basic Lambda permissions</strong>. Then go to IAM and add permissions for SES, DynamoDB, SQS to that role.",n:""},
    {t:"Write the function",d:"In the code editor, write your handler. Export: <strong>exports.handler = async (event) => { ... }</strong>. The event object contains the trigger data (SQS message body, S3 event, etc.).",n:""},
    {t:"Configure timeout and memory",d:"Configuration → General configuration. Memory: <strong>256 MB</strong>. Timeout: <strong>30 seconds</strong>. Default is only 3 seconds — increase it for any real work.",n:""},
    {t:"Environment variables",d:"Configuration → Environment variables. Add DB_HOST, REDIS_URL, etc. But prefer <strong>Secrets Manager</strong> — fetch secrets in code, not env vars.",n:""},
    {t:"Add trigger",d:"Click <strong>Add trigger</strong>. For email worker: choose SQS → select taskapp-tasks queue → Batch size: 10. Lambda polls SQS automatically and invokes handler with messages.",n:""},
    {t:"Deploy and test",d:"Click <strong>Deploy</strong> after any code change. Then <strong>Test</strong> tab → create test event with sample payload → Run. Check CloudWatch Logs for output.",n:""},
  ],
  cli:`# Create Lambda function from zip
zip -r function.zip index.js node_modules/

aws lambda create-function \\
  --function-name taskapp-email-worker \\
  --runtime nodejs20.x \\
  --zip-file fileb://function.zip \\
  --handler index.handler \\
  --role arn:aws:iam::ACCOUNT:role/lambda-role \\
  --timeout 30 \\
  --memory-size 256

# Add SQS trigger
aws lambda create-event-source-mapping \\
  --function-name taskapp-email-worker \\
  --event-source-arn arn:aws:sqs:region:ACCOUNT:taskapp-tasks \\
  --batch-size 10`,
  tips:[
    {h:"Cold starts",b:"Lambda has cold start latency (~100-500ms) on first invocation. Use Provisioned Concurrency for latency-sensitive APIs. Keep functions warm with EventBridge scheduled pings"},
    {h:"Layers",b:"Use Lambda Layers for shared dependencies (node_modules). All functions share one layer — reduces deployment package size dramatically"},
    {h:"1M free forever",b:"Lambda free tier: 1 million requests + 400,000 GB-seconds compute/month — permanent, not just 12 months. Great for low-traffic workloads"},
    {h:"Powertools",b:"Use AWS Lambda Powertools for Node.js — gives you structured logging, tracing (X-Ray), and metrics in 3 lines of code"},
  ]
},

{ cat:"Storage", icon:"🪣", bg:"rgba(81,207,102,.1)", name:"S3", full:"Simple Storage Service", tagline:"Object storage for files, frontend, backups", free:true,
  what:"S3 stores any file (object) inside containers called buckets. This project uses two buckets: one to host the React frontend as a static website, and one to store user-uploaded attachments (accessed via presigned URLs). S3 scales infinitely, charges per GB stored.",
  console:["S3","Create bucket"],
  steps:[
    {t:"Create frontend bucket",d:"S3 → <strong>Create bucket</strong>. Name: <strong>taskapp-frontend-YOURNAME</strong> (globally unique). Region: ap-south-1. Leave all settings at default for now.",n:""},
    {t:"Disable Block Public Access",d:"In bucket settings → Permissions → Block public access → Edit → <strong>Uncheck all</strong>. Confirm. This allows CloudFront to serve files (but we'll restrict to only CloudFront via bucket policy).",n:""},
    {t:"Enable static website hosting",d:"Properties tab → Static website hosting → Enable. Index document: <strong>index.html</strong>. Error document: <strong>index.html</strong> (important for React Router).",n:""},
    {t:"Add bucket policy for CloudFront",d:"Permissions → Bucket policy → paste policy that allows only your CloudFront distribution (OAC) to read objects. Never open to public 0.0.0.0/0 directly.",n:""},
    {t:"Create uploads bucket",d:"Create another bucket: <strong>taskapp-uploads-YOURNAME</strong>. Keep Block Public Access <strong>ON</strong>. Files accessed only via presigned URLs from your backend.",n:""},
    {t:"Enable CORS on uploads bucket",d:"Uploads bucket → Permissions → CORS → paste config allowing PUT from your frontend domain. This enables browser direct-upload to S3.",n:""},
    {t:"Enable versioning (optional)",d:"For uploads bucket: Properties → Bucket Versioning → Enable. Keeps old versions of files — protection against accidental overwrites. Costs more in storage.",n:""},
    {t:"Deploy frontend",d:"<code>npm run build</code> then <code>aws s3 sync ./build s3://taskapp-frontend-YOURNAME --delete</code>. The --delete flag removes old files not in the new build.",n:""},
  ],
  cli:`# Create buckets
aws s3 mb s3://taskapp-frontend-yourname --region ap-south-1
aws s3 mb s3://taskapp-uploads-yourname --region ap-south-1

# Deploy frontend build
npm run build
aws s3 sync ./build s3://taskapp-frontend-yourname \\
  --delete \\
  --cache-control "max-age=86400"

# Upload single file
aws s3 cp file.pdf s3://taskapp-uploads-yourname/uploads/file.pdf`,
  tips:[
    {h:"Lifecycle rules",b:"Add lifecycle rule: move files to S3 Glacier after 90 days (80% cheaper). Delete incomplete multipart uploads after 7 days"},
    {h:"Presigned URLs",b:"Never expose uploads bucket publicly. Generate presigned PUT URL on backend → frontend uploads directly to S3 → no file goes through your server"},
    {h:"Transfer Acceleration",b:"Enable S3 Transfer Acceleration for globally distributed users. Files upload through CloudFront edge → S3, much faster than direct upload"},
    {h:"Event notifications",b:"S3 → Properties → Event notifications → trigger Lambda when files are uploaded. Use for image resizing, virus scanning, processing"},
  ]
},

{ cat:"Database", icon:"🐘", bg:"rgba(247,131,172,.1)", name:"RDS", full:"Relational Database Service — PostgreSQL", tagline:"Managed PostgreSQL — users, tasks, projects", free:true,

    {t:"Settings",d:"DB instance identifier: <strong>taskapp-db</strong>. Master username: <strong>taskapp_admin</strong>. Master password: Generate and save in <strong>Secrets Manager</strong> (tick the option).",n:""},

    {t:"Additional configuration",d:"Initial database name: <strong>taskapp</strong>. Backup retention: <strong>7 days</strong>. Enable <strong>Enhanced monitoring</strong>. Enable <strong>Performance Insights</strong> (free for 7 days retention).",n:""},

{ cat:"Database", icon:"⚡", bg:"rgba(247,131,172,.1)", name:"DynamoDB", full:"Amazon DynamoDB", tagline:"NoSQL — sessions, notifications, audit logs", free:true,

  console:["DynamoDB","Create table"],
  steps:[

    {t:"Table name and partition key",d:"Table name: <strong>Sessions</strong>. Partition key: <strong>userId</strong> (String). Sort key: <strong>sessionId</strong> (String). Composite key lets you query all sessions for a user.",n:""},
    {t:"Table settings",d:"Table settings: <strong>Customize settings</strong>. Table class: <strong>DynamoDB Standard</strong>.",n:""},

    {t:"Enable TTL",d:"Additional settings → Time to Live (TTL) → Turn on → Attribute name: <strong>ttl</strong>. Store Unix timestamp in this field. DynamoDB auto-deletes expired items (great for sessions).",n:"TTL = auto-expire rows"},

{ cat:"Auth & Security", icon:"🛡️", bg:"rgba(151,117,250,.12)", name:"IAM", full:"Identity and Access Management", tagline:"Who can do what — roles, policies, least privilege", free:true,
  what:"IAM controls access to every AWS service. Instead of hardcoding AWS keys, you create IAM Roles (identities) and attach Policies (permission documents). EC2, Lambda, and ECS assume roles automatically — no credentials to manage, rotate, or leak.",
  console:["IAM","Roles","Create role"],
  steps:[
    {t:"Create EC2 Role",d:"IAM Console → <strong>Roles</strong> → <strong>Create role</strong>. Trusted entity type: <strong>AWS service</strong>. Use case: <strong>EC2</strong>. This allows EC2 to assume the role.",n:""},
    {t:"Attach permissions policies",d:"Search and attach: <strong>AmazonSSMManagedInstanceCore</strong> (for Session Manager SSH). Then create custom inline policy for S3, SQS, Secrets Manager access.",n:""},
    {t:"Write least-privilege policy",d:"Create inline policy. Allow only the specific actions and resources your app needs. Never use AdministratorAccess or FullAccess on production resources.",n:""},
    {t:"Name and create",d:"Role name: <strong>taskapp-ec2-role</strong>. Click Create. Go to EC2 console → select your instance → Actions → Security → Modify IAM role → attach taskapp-ec2-role.",n:""},
    {t:"Create Lambda Role",d:"Repeat for Lambda. Trusted entity: Lambda. Attach: AWSLambdaBasicExecutionRole (CloudWatch logs). Then add custom policy for SES, SQS, DynamoDB access.",n:""},
    {t:"Create ECS Task Role",d:"For ECS containers: create role with trusted entity ECS Tasks. Attach permissions your containers need (S3, SQS). Attach as Task Role in ECS task definition.",n:""},
    {t:"Test permissions with Policy Simulator",d:"IAM Console → <strong>Policy Simulator</strong>. Select a role, choose a service and action, simulate. Shows exactly what is allowed or denied before deploying.",n:""},
  ],
  cli:`# Create EC2 role
aws iam create-role \\
  --role-name taskapp-ec2-role \\
  --assume-role-policy-document '{
    "Version":"2012-10-17",
    "Statement":[{"Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole"}]
  }'

# Attach inline policy
aws iam put-role-policy \\
  --role-name taskapp-ec2-role \\
  --policy-name taskapp-ec2-permissions \\
  --policy-document file://ec2-policy.json

# Create instance profile (required to attach role to EC2)
aws iam create-instance-profile \\
  --instance-profile-name taskapp-ec2-role
aws iam add-role-to-instance-profile \\
  --instance-profile-name taskapp-ec2-role \\
  --role-name taskapp-ec2-role`,
  tips:[
    {h:"Least privilege always",b:"Start with no permissions and add only what's needed. Never start with AdministratorAccess. Ask: what exact actions does this service need?"},
    {h:"Resource-level",b:"Restrict to specific resources: s3:GetObject on arn:aws:s3:::taskapp-uploads/* not *. This limits blast radius if credentials are compromised"},
    {h:"Permission boundaries",b:"Use permission boundaries for delegated admin — a user can create roles but only with permissions within the boundary. Prevents privilege escalation"},
    {h:"Access Analyzer",b:"Enable IAM Access Analyzer to find resources shared with external accounts (unintended public S3, SQS policies). Shows external access in one dashboard"},
  ]
},

{ cat:"Auth & Security", icon:"🧱", bg:"rgba(151,117,250,.12)", name:"WAF", full:"Web Application Firewall", tagline:"Block attacks before they reach your server", free:false,
  what:"WAF sits in front of CloudFront or ALB and filters HTTP requests before they reach your EC2. It blocks SQL injection, XSS, bad bots, and rate limits requests per IP. AWS provides managed rule groups that are updated by AWS security team automatically.",
  console:["WAF & Shield","Web ACLs","Create web ACL"],
  steps:[
    {t:"Open WAF → Create Web ACL",d:"WAF & Shield Console → <strong>Web ACLs</strong> → <strong>Create web ACL</strong>. For CloudFront: region must be <strong>us-east-1</strong> (global). For ALB: use the ALB's region.",n:""},
    {t:"Name and resource",d:"Name: <strong>taskapp-waf</strong>. Resource type: <strong>CloudFront distributions</strong> or <strong>Application Load Balancer</strong>. Add associated resources: select your CloudFront distribution.",n:"$5/month + $1/million reqs"},
    {t:"Add AWS managed rules",d:"Click <strong>Add rules</strong> → <strong>Add managed rule groups</strong>. Add: <strong>AWSManagedRulesCommonRuleSet</strong> (XSS, LFI, RCE). Add: <strong>AWSManagedRulesKnownBadInputsRuleSet</strong> (Log4J, SSRF).",n:""},
    {t:"Add SQL injection rules",d:"Also add: <strong>AWSManagedRulesSQLiRuleSet</strong>. These rule groups are maintained by AWS security team and updated automatically when new threats emerge.",n:""},
    {t:"Add rate limiting rule",d:"Add rules → <strong>Add my own rules</strong> → <strong>Rate-based rule</strong>. Name: RateLimit. Rate limit: <strong>2000 requests per 5 minutes</strong> per IP. Action: Block. This blocks brute force and DDoS.",n:""},
    {t:"Set default action",d:"Default web ACL action for requests that don't match any rule: <strong>Allow</strong>. Rules block bad traffic; everything else passes through.",n:""},
    {t:"Enable metrics",d:"CloudWatch metrics: enabled. Sampled requests: enabled. These give you visibility into blocked requests and attack patterns in CloudWatch.",n:""},
  ],
  cli:`aws wafv2 create-web-acl \\
  --name taskapp-waf \\
  --scope CLOUDFRONT \\
  --region us-east-1 \\
  --default-action Allow={} \\
  --rules '[
    {"Name":"CommonRules","Priority":1,
     "OverrideAction":{"None":{}},
     "Statement":{"ManagedRuleGroupStatement":{"VendorName":"AWS","Name":"AWSManagedRulesCommonRuleSet"}},
     "VisibilityConfig":{"SampledRequestsEnabled":true,"CloudWatchMetricsEnabled":true,"MetricName":"CommonRules"}},
    {"Name":"RateLimit","Priority":2,
     "Action":{"Block":{}},
     "Statement":{"RateBasedStatement":{"Limit":2000,"AggregateKeyType":"IP"}},
     "VisibilityConfig":{"SampledRequestsEnabled":true,"CloudWatchMetricsEnabled":true,"MetricName":"RateLimit"}}
  ]' \\
  --visibility-config SampledRequestsEnabled=true,CloudWatchMetricsEnabled=true,MetricName=taskapp-waf`,
  tips:[
    {h:"Count mode first",b:"Set new rules to Count (not Block) for the first week. Monitor what gets flagged in CloudWatch. Only switch to Block after confirming no false positives"},
    {h:"Geo blocking",b:"Add Geo match rule to block countries you don't serve. Reduces attack surface significantly with no false positives for legitimate users"},
    {h:"Bot Control",b:"Add AWS Bot Control managed rule group ($10/month) — blocks known bad bots, scrapers, credential stuffers while allowing GoogleBot and other good bots"},
    {h:"IP reputation",b:"Add AWSManagedRulesAmazonIpReputationList — blocks IPs known to AWS as bad actors (botnets, Tor exit nodes, scanners). Highly effective, low false positives"},
  ]
},

{ cat:"Auth & Security", icon:"🔒", bg:"rgba(151,117,250,.12)", name:"ACM", full:"AWS Certificate Manager", tagline:"Free SSL/TLS certificates — auto-renewed", free:true,
  what:"ACM provides free SSL/TLS certificates for HTTPS. You request a cert for your domain, verify ownership via DNS, and attach it to CloudFront or ALB. ACM auto-renews before expiry — you never have to touch a certificate again.",
  console:["Certificate Manager","Request a certificate"],
  steps:[
    {t:"Open ACM — choose correct region",d:"For CloudFront certificates: open ACM in <strong>us-east-1 (N. Virginia)</strong> specifically — CloudFront only accepts certs from us-east-1. For ALB only: use your app's region.",n:"Critical: must be us-east-1 for CloudFront"},
    {t:"Request a certificate",d:"ACM → <strong>Request a certificate</strong> → <strong>Request a public certificate</strong> → Next.",n:""},
    {t:"Add domain names",d:"Fully qualified domain name: <strong>taskapp.com</strong>. Click <strong>Add another name</strong>: add <strong>*.taskapp.com</strong> (wildcard covers www, api, app subdomains).",n:""},
    {t:"DNS validation",d:"Validation method: <strong>DNS validation</strong> (recommended). Email validation is manual; DNS is automatic. Click Request.",n:""},
    {t:"Create DNS validation records",d:"ACM shows CNAME records to add. If you use Route 53: click <strong>Create records in Route 53</strong> — it auto-adds the CNAMEs. Validation takes 5-30 minutes.",n:""},
    {t:"Wait for Issued status",d:"Refresh the ACM console. Status changes from Pending to <strong>Issued</strong>. Certificate ARN is now ready to use.",n:""},
    {t:"Attach to CloudFront",d:"In CloudFront distribution settings → Edit → Custom SSL certificate → select your ACM cert from the dropdown. Save changes.",n:""},
    {t:"Attach to ALB",d:"In ALB → Listeners → HTTPS:443 → Edit → Default SSL certificate → change to your ACM cert. Add redirect rule on HTTP:80 → HTTPS.",n:""},
  ],
  cli:`# Request certificate (must be us-east-1 for CloudFront)
aws acm request-certificate \\
  --domain-name taskapp.com \\
  --subject-alternative-names "*.taskapp.com" \\
  --validation-method DNS \\
  --region us-east-1

# After validation, check status
aws acm describe-certificate \\
  --certificate-arn arn:aws:acm:us-east-1:ACCOUNT:certificate/xxx \\
  --region us-east-1 \\
  --query 'Certificate.Status'`,
  tips:[
    {h:"Always wildcard",b:"Request *.taskapp.com + taskapp.com together in one cert. Wildcard covers all subdomains. No extra cost — certs are always free"},
    {h:"Auto-renewal",b:"ACM renews automatically 60 days before expiry. As long as your DNS CNAME validation record exists, renewal is fully automatic — zero work"},
    {h:"Region matters",b:"CloudFront is global, so it needs a cert from us-east-1. ALB, API Gateway use regional certs. You may need two certs in different regions"},
    {h:"Imported certs",b:"You can import your own certificate (e.g. Let's Encrypt). But ACM-issued certs are free and auto-renew — almost never a reason to import"},
  ]
},

{ cat:"API", icon:"🔌", bg:"rgba(255,140,0,.1)", name:"API Gateway", full:"Amazon API Gateway", tagline:"REST API entry point — routing, auth, rate limits", free:true,
  what:"API Gateway is the front door of your backend. It receives all HTTP requests from the frontend, authenticates them using the Cognito authorizer, and forwards them to your EC2 ALB or Lambda functions. It handles rate limiting, CORS, request validation, and API versioning.",
  console:["API Gateway","Create API","REST API"],
  steps:[
    {t:"Open API Gateway → Create API",d:"API Gateway Console → <strong>Create API</strong> → choose <strong>REST API</strong> (not HTTP API — REST has more features like API keys and usage plans) → <strong>Build</strong>.",n:"Free: 1M calls/month for 12 months"},
    {t:"Create REST API",d:"Protocol: REST. Create new API. API name: <strong>taskapp-api</strong>. Endpoint type: <strong>Regional</strong> (for ALB backend) or <strong>Edge optimized</strong> (for Lambda, uses CloudFront).",n:""},
    {t:"Create Cognito Authorizer",d:"Left panel → <strong>Authorizers</strong> → <strong>Create authorizer</strong>. Name: CognitoAuth. Type: <strong>Cognito</strong>. User pool: select taskapp-users. Token source: <strong>Authorization</strong> (header). Click Create.",n:""},
    {t:"Create resources",d:"Left panel → <strong>Resources</strong> → Actions → <strong>Create resource</strong>. Resource path: <strong>/tasks</strong>. Enable CORS. Repeat for /upload, /projects.",n:""},
    {t:"Create methods",d:"Select /tasks → Actions → <strong>Create Method</strong> → GET. Integration type: <strong>HTTP</strong>. HTTP method: GET. Endpoint URL: http://your-alb-dns/tasks. Click Save.",n:""},
    {t:"Attach authorizer to methods",d:"Select GET method → <strong>Method Request</strong> → Authorization: select <strong>CognitoAuth</strong>. Now this endpoint requires a valid Cognito JWT. Repeat for all protected methods.",n:""},
    {t:"Enable CORS",d:"Select /tasks resource → Actions → <strong>Enable CORS</strong>. Access-Control-Allow-Origin: your domain. Methods: GET,POST,PUT,DELETE. Headers: Authorization,Content-Type. Click Enable.",n:""},
    {t:"Deploy API",d:"Actions → <strong>Deploy API</strong>. Deployment stage: create new stage named <strong>prod</strong>. Click Deploy. Copy the Invoke URL — add it to your frontend as REACT_APP_API_URL.",n:""},
  ],
  cli:`# Create REST API
aws apigateway create-rest-api \\
  --name taskapp-api \\
  --endpoint-configuration types=REGIONAL

# Get root resource id
aws apigateway get-resources \\
  --rest-api-id API_ID

# Create /tasks resource
aws apigateway create-resource \\
  --rest-api-id API_ID \\
  --parent-id ROOT_RESOURCE_ID \\
  --path-part tasks

# Create Cognito authorizer
aws apigateway create-authorizer \\
  --rest-api-id API_ID \\
  --name CognitoAuth \\
  --type COGNITO_USER_POOLS \\
  --provider-arns arn:aws:cognito-idp:region:account:userpool/pool-id \\
  --identity-source 'method.request.header.Authorization'`,
  tips:[
    {h:"REST vs HTTP API",b:"HTTP API is cheaper and faster but fewer features. REST API has API keys, usage plans, request/response mapping, and WAF support — use REST for full control"},
    {h:"Usage plans + API keys",b:"Create Usage Plans (e.g. basic: 1000 req/day, premium: 10000 req/day) and API Keys for third-party integrations. Throttle by key per plan"},
    {h:"Request validation",b:"Enable request validation in Method Request — validate body, headers, query params against JSON Schema model. Reject bad requests before they hit your backend"},
    {h:"Caching",b:"Enable API Gateway caching (0.5 GB cache = $0.02/hr). Cache GET responses for 60-300 seconds. Reduces backend load and improves response times"},
  ]
},

{ cat:"API", icon:"🌐", bg:"rgba(255,140,0,.1)", name:"CloudFront", full:"Amazon CloudFront", tagline:"CDN — global edge delivery for frontend and API", free:true,

  cli:`aws cloudfront create-distribution \\

{ cat:"Messaging", icon:"📬", bg:"rgba(56,217,169,.1)", name:"SQS", full:"Simple Queue Service", tagline:"Message queue — decouple API from background workers", free:true,
  what:"SQS is a message queue that decouples your API from background processing. When a user creates a task, the API puts a message in SQS and responds immediately (fast). A Lambda or ECS worker picks up the message and does the slow work (sending email, generating PDF) asynchronously.",
  console:["SQS","Create queue"],
  steps:[
    {t:"Open SQS → Create queue",d:"SQS Console → <strong>Create queue</strong>.",n:"Free: 1M requests/month"},
    {t:"Queue type",d:"Type: <strong>Standard queue</strong> (unlimited throughput, at-least-once delivery). Use FIFO only if exact order matters (e.g. payment processing).",n:""},
    {t:"Queue name and settings",d:"Name: <strong>taskapp-tasks</strong>. Visibility timeout: <strong>60 seconds</strong> (time Lambda has to process before message re-appears for retry). Message retention: <strong>1 day</strong>.",n:""},
    {t:"Receive message wait time",d:"Receive message wait time: <strong>20 seconds</strong>. This enables Long Polling — reduces empty receives and cost. Lambda does this automatically.",n:""},
    {t:"Create Dead Letter Queue (DLQ)",d:"First create another queue: <strong>taskapp-tasks-dlq</strong>. Then in the main queue, enable <strong>Dead-letter queue</strong>. Select taskapp-tasks-dlq. Maximum receives: <strong>3</strong> (after 3 failed attempts, move to DLQ).",n:"DLQ = safety net for failures"},
    {t:"Access policy",d:"Access policy: Basic. Define who can send/receive. Choose your EC2 role and Lambda role. Or use resource-based policy JSON for fine control.",n:""},
    {t:"Encryption",d:"Encryption: choose <strong>Amazon SQS key (SSE-SQS)</strong>. Free encryption using AWS-managed key. Messages encrypted at rest.",n:""},
    {t:"Wire up Lambda trigger",d:"After creating queue, go to Lambda → select your email worker function → Add trigger → SQS → select taskapp-tasks → Batch size: 10. Lambda now polls SQS automatically.",n:""},
  ],
  cli:`# Create main queue
aws sqs create-queue \\
  --queue-name taskapp-tasks \\
  --attributes '{
    "VisibilityTimeout":"60",
    "MessageRetentionPeriod":"86400",
    "ReceiveMessageWaitTimeSeconds":"20",
    "RedrivePolicy":"{\"deadLetterTargetArn\":\"arn:aws:sqs:region:account:taskapp-tasks-dlq\",\"maxReceiveCount\":\"3\"}"
  }'

# Send message from Node.js (in EC2 server code)
# const sqs = new SQSClient({region:"ap-south-1"})
# await sqs.send(new SendMessageCommand({
#   QueueUrl: process.env.SQS_TASK_QUEUE_URL,
#   MessageBody: JSON.stringify({type:"TASK_CREATED", taskId, userId})
# }))`,
  tips:[
    {h:"Idempotent consumers",b:"SQS delivers at-least-once — your consumer may receive duplicates. Make processing idempotent: check if task already processed before acting"},
    {h:"DLQ monitoring",b:"Set CloudWatch alarm on DLQ ApproximateNumberOfMessagesVisible > 0. Any message in DLQ means a failure — investigate immediately"},
    {h:"Batch size vs timeout",b:"Lambda batch size 10 = Lambda gets 10 messages at once. Process all 10 in parallel. Visibility timeout must be > your processing time for entire batch"},
    {h:"FIFO for ordering",b:"FIFO queues guarantee exactly-once, in-order delivery. Max 300 TPS. Add .fifo suffix to name. Use MessageGroupId to parallelize within a group"},
  ]
},

{ cat:"Messaging", icon:"📢", bg:"rgba(56,217,169,.1)", name:"SNS", full:"Simple Notification Service", tagline:"Pub/Sub — broadcast notifications to multiple targets", free:true,
  what:"SNS is a publish-subscribe service. One message published to an SNS Topic is delivered to ALL subscribers — multiple SQS queues, Lambda functions, email addresses, or HTTP endpoints simultaneously. Use it when one event needs to trigger multiple different actions.",
  console:["SNS","Topics","Create topic"],
  steps:[
    {t:"Open SNS → Create topic",d:"SNS Console → <strong>Topics</strong> → <strong>Create topic</strong>.",n:"Free: 1M publishes/month"},
    {t:"Topic type",d:"Type: <strong>Standard</strong> (high throughput, at-least-once). FIFO only if subscribers need strict ordering.",n:""},
    {t:"Topic name",d:"Name: <strong>taskapp-notifications</strong>. Display name (for SMS): <strong>TaskApp</strong>. Encryption: SSE enabled (SSE-SNS key).",n:""},
    {t:"Create subscription — SQS",d:"After topic creation: <strong>Create subscription</strong>. Protocol: <strong>SQS</strong>. Endpoint: select taskapp-tasks queue ARN. This fans out to SQS.",n:""},
    {t:"Create subscription — Email",d:"Create another subscription. Protocol: <strong>Email</strong>. Endpoint: admin@yourdomain.com. Confirm the subscription email AWS sends.",n:""},
    {t:"Create subscription — Lambda",d:"Protocol: <strong>AWS Lambda</strong>. Endpoint: select your notification Lambda function ARN. All three subscribers receive every published message.",n:""},
    {t:"Set SQS queue access policy",d:"The SQS queue needs a policy allowing SNS to send messages to it. SQS Console → queue → Access policy → add Allow sqs:SendMessage from the SNS topic ARN.",n:""},
    {t:"Publish from backend",d:"In your Node.js code: use SNS PublishCommand. Set Message (JSON body) and Subject. All subscribers receive it instantly.",n:""},
  ],
  cli:`# Create topic
aws sns create-topic --name taskapp-notifications

# Subscribe SQS to SNS
aws sns subscribe \\
  --topic-arn arn:aws:sns:region:account:taskapp-notifications \\
  --protocol sqs \\
  --notification-endpoint arn:aws:sqs:region:account:taskapp-tasks

# Subscribe email
aws sns subscribe \\
  --topic-arn arn:aws:sns:region:account:taskapp-notifications \\
  --protocol email \\
  --notification-endpoint admin@yourdomain.com

# Publish message
aws sns publish \\
  --topic-arn arn:aws:sns:region:account:taskapp-notifications \\
  --message '{"type":"TASK_DUE","taskId":"123","userId":"456"}' \\
  --subject "Task Reminder"`,
  tips:[
    {h:"Message filtering",b:"Add FilterPolicy to subscriptions — each subscriber only receives messages matching their filter. E.g. email subscriber gets only TASK_DUE events, SQS gets everything"},
    {h:"Mobile push",b:"SNS supports Apple APNs, Google FCM for mobile push notifications. Create Platform Application for each platform, then subscribe device tokens"},
    {h:"Fan-out pattern",b:"SNS → multiple SQS queues is the fan-out pattern. Email service reads from one queue, analytics reads from another — fully decoupled"},
    {h:"Message attributes",b:"Add message attributes (key-value metadata) to published messages. Subscribers use these in filter policies without parsing the message body"},
  ]
},

{ cat:"Messaging", icon:"📧", bg:"rgba(56,217,169,.1)", name:"SES", full:"Simple Email Service", tagline:"Send transactional emails — verification, reminders, alerts", free:false,
  what:"SES sends transactional emails from your application: account verification, password reset, task reminders, due date alerts. It's 62x cheaper than services like SendGrid. In Sandbox mode (dev), you can only send to verified addresses. Request production access to send to anyone.",

  cli:`# Send email via CLI (after domain verified)

  tips:[

    {h:"Bounce management",b:"High bounce rate (>5%) gets your account suspended. Never email unverified addresses. Use double opt-in. Process bounces immediately and remove from list"},

},

// ── BUILD UI ─────────────────────────────────────────────────

function buildCatFilters() {
  const cats = [...new Set(SERVICES.map(s => s.cat))];
  const container = document.getElementById('cat-filters');
  const all = document.createElement('button');
  all.className = 'cf on';
  all.textContent = 'All';
  all.dataset.cat = '';
  all.onclick = () => { setFilter(''); };
  container.appendChild(all);
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cf';
    btn.textContent = c;
    btn.dataset.cat = c;
    btn.onclick = () => { setFilter(c); };
    container.appendChild(btn);
  });
}

let activeFilter = '';
function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.cf').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === cat);
  });
  filterAll();
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.svc-card').forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const cat = card.dataset.cat;
    const full = card.dataset.full.toLowerCase();
    const tagline = card.dataset.tagline.toLowerCase();
    const matchQ = !q || name.includes(q) || full.includes(q) || tagline.includes(q) || cat.toLowerCase().includes(q);
    const matchCat = !activeFilter || cat === activeFilter;
    card.classList.toggle('hidden', !(matchQ && matchCat));
  });
  document.querySelectorAll('.section-group').forEach(group => {
    const visible = group.querySelectorAll('.svc-card:not(.hidden)').length;
    group.classList.toggle('empty', visible === 0);
  });
}

function stepsHTML(steps) {
  return steps.map((s, i) => `
    <div class="step-row">
      <div class="step-left">
        <div class="step-num">${i+1}</div>
        <div class="step-line"></div>
      </div>
      <div class="step-content">
        <div class="step-title">${s.t}</div>
        <div class="step-detail">${s.d}</div>
        ${s.n ? `<span class="step-note">${s.n}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function tipsHTML(tips) {
  return tips.map(t => `
    <div class="tip-card">
      <div class="tip-head"><span class="tip-dot"></span>${t.h}</div>
      <div class="tip-body">${t.b}</div>
    </div>
  `).join('');
}

function consolePathHTML(steps) {
  return steps.map((s, i) =>
    `<span class="path-step ${i === steps.length-1 ? 'active-path' : ''}">${s}</span>${i < steps.length-1 ? '<span class="path-arrow">›</span>' : ''}`
  ).join('');
}

function buildPage() {
  const cats = [...new Set(SERVICES.map(s => s.cat))];
  const page = document.getElementById('page');

  cats.forEach(cat => {
    const group = document.createElement('div');
    group.className = 'section-group';
    const catInfo = CATS[cat] || { color: '#888', dot: '#888' };
    group.innerHTML = `
      <div class="group-header">
        <div class="group-dot" style="background:${catInfo.dot}"></div>
        <span class="group-title">${cat}</span>
        <span class="group-count">${SERVICES.filter(s => s.cat === cat).length} services</span>
      </div>
    `;

    SERVICES.filter(s => s.cat === cat).forEach(svc => {
      const card = document.createElement('div');
      card.className = 'svc-card';
      card.dataset.name = svc.name;
      card.dataset.cat = svc.cat;
      card.dataset.full = svc.full;
      card.dataset.tagline = svc.tagline;
      card.innerHTML = `
        <div class="card-trigger" onclick="toggleCard(this)">
          <div class="svc-icon-wrap" style="background:${svc.bg}">
            <span style="font-size:22px">${svc.icon}</span>
          </div>
          <div class="svc-info">
            <div class="svc-name">${svc.name} <span style="font-weight:400;color:var(--muted);font-size:12px">— ${svc.full}</span></div>
            <div class="svc-tagline">${svc.tagline}</div>
          </div>
          <div class="svc-badges">
            <span class="badge ${svc.free ? 'badge-free' : 'badge-paid'}">${svc.free ? 'FREE TIER' : 'PAID'}</span>
          </div>
          <span class="card-arrow">▾</span>
        </div>
        <div class="card-body">
          <div class="card-body-inner">
            <div class="what-is">${svc.what}</div>

            <div class="section-title">Console path</div>
            <div class="console-path">${consolePathHTML(svc.console)}</div>

            <div class="section-title">Step-by-step setup</div>
            <div class="steps-list">${stepsHTML(svc.steps)}</div>

            <div class="section-title">AWS CLI command</div>
            <div class="code-block">
              <div class="code-header">
                <span class="code-fname">aws cli</span>
                <button class="copy-btn" onclick="copyCode(this)">Copy</button>
              </div>
              <pre>${escapeHTML(svc.cli)}</pre>
            </div>

            <div class="section-title">Best practices & tips</div>
            <div class="tips-grid">${tipsHTML(svc.tips)}</div>
          </div>
        </div>
      `;
      group.appendChild(card);
    });

    page.appendChild(group);
  });
}

function toggleCard(trigger) {
  const card = trigger.closest('.svc-card');
  const wasOpen = card.classList.contains('active');
  document.querySelectorAll('.svc-card.active').forEach(c => c.classList.remove('active'));
  if (!wasOpen) card.classList.add('active');
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildCatFilters();
buildPage();
</script>
