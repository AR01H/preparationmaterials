<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps War Room — 100 Interview Scenarios</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #2a2d35;
    --accent: #00ff88;
    --accent2: #ff4d6d;
    --accent3: #ffd60a;
    --accent4: #6c9fff;
    --text: #e2e8f0;
    --muted: #64748b;
    --red: #ff4d6d;
    --yellow: #ffd60a;
    --green: #00ff88;
    --blue: #6c9fff;
    --purple: #c084fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ANIMATED BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 10% 20%, rgba(0,255,136,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 90% 80%, rgba(108,159,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,255,136,0.03) 0%, transparent 100%);
    z-index: 1;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-tag::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  h1 span { color: var(--accent); }

  .header-sub {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* SEARCH + FILTERS */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 12, 16, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .filter-btn[data-cat="k8s"].active { background: var(--blue); border-color: var(--blue); color: #000; }
  .filter-btn[data-cat="docker"].active { background: var(--blue); border-color: var(--blue); color: #000; }
  .filter-btn[data-cat="debug"].active { background: var(--red); border-color: var(--red); color: #fff; }
  .filter-btn[data-cat="perf"].active { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .filter-btn[data-cat="network"].active { background: var(--purple); border-color: var(--purple); color: #000; }
  .filter-btn[data-cat="storage"].active { background: var(--accent); border-color: var(--accent); color: #000; }
  .filter-btn[data-cat="ci"].active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* COUNT */
  .results-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 0 40px 12px;
    margin-top: 8px;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    padding: 24px 40px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* CATEGORY SECTION */
  .category-section { margin-bottom: 48px; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .category-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .category-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .category-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .q-card:hover { border-color: #3a3d45; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    margin-top: 2px;
    font-weight: 600;
  }

  .q-text {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
  }

  .q-tags {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .tag-k8s { background: rgba(108,159,255,0.15); color: var(--blue); }
  .tag-docker { background: rgba(108,159,255,0.1); color: #60a5fa; }
  .tag-debug { background: rgba(255,77,109,0.15); color: var(--red); }
  .tag-perf { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .tag-network { background: rgba(192,132,252,0.15); color: var(--purple); }
  .tag-storage { background: rgba(0,255,136,0.12); color: var(--green); }
  .tag-ci { background: rgba(0,255,136,0.1); color: #34d399; }
  .tag-hot { background: rgba(255,77,109,0.2); color: var(--red); }

  .q-toggle {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    min-width: 16px;
    text-align: center;
    margin-top: 3px;
  }

  .q-card.open .q-toggle { transform: rotate(180deg); color: var(--accent); }
  .q-card.open .q-header { border-bottom: 1px solid var(--border); }

  /* ANSWER */
  .q-answer {
    display: none;
    padding: 20px 20px 20px 62px;
    background: var(--surface2);
  }

  .q-card.open .q-answer { display: block; }

  .answer-section { margin-bottom: 16px; }

  .answer-section:last-child { margin-bottom: 0; }

  .ans-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .ans-text {
    font-size: 14px;
    color: #94a3b8;
    line-height: 1.7;
  }

  .ans-text strong { color: var(--text); font-weight: 700; }

  .cmd-block {
    background: #0d1117;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 14px 16px;
    margin: 10px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #e2e8f0;
    overflow-x: auto;
    line-height: 1.8;
    white-space: pre;
  }

  .cmd-comment { color: var(--muted); }
  .cmd-cmd { color: var(--green); }
  .cmd-flag { color: var(--yellow); }
  .cmd-val { color: var(--blue); }

  .steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .steps li {
    display: flex;
    gap: 10px;
    font-size: 14px;
    color: #94a3b8;
    line-height: 1.6;
  }

  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
    margin-top: 2px;
  }

  .tip-box {
    background: rgba(255,214,10,0.06);
    border: 1px solid rgba(255,214,10,0.2);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 13px;
    color: #a89040;
    margin-top: 12px;
  }

  .tip-box strong { color: var(--yellow); }

  /* HIDDEN */
  .q-card.hidden { display: none; }

  /* PROGRESS */
  .progress-bar-wrap {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--border);
    z-index: 999;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.1s;
  }

  /* BACK TO TOP */
  .back-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 99;
    opacity: 0;
    pointer-events: none;
  }

  .back-top.visible { opacity: 1; pointer-events: all; }
  .back-top:hover { background: var(--accent); color: #000; }

  @media (max-width: 768px) {
    header, .controls, main { padding-left: 20px; padding-right: 20px; }
    .q-answer { padding-left: 20px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar" id="pgbar"></div></div>

<header>
  <div class="header-tag">⚡ DevOps Interview Prep</div>
  <h1>The <span>War Room</span><br>Interview Bible</h1>
  <div class="header-sub">// 100 real production scenarios — K8s · Docker · Debugging · Performance · Networking</div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">100</div><div class="stat-label">Questions</div></div>
    <div class="stat"><div class="stat-num">7</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Commands</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <div class="search-icon">⌕</div>
    <input type="text" id="searchInput" placeholder="Search questions, commands, concepts...">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="k8s">☸ K8s</button>
    <button class="filter-btn" data-cat="docker">🐳 Docker</button>
    <button class="filter-btn" data-cat="debug">🔥 Debug</button>
    <button class="filter-btn" data-cat="perf">⚡ Perf</button>
    <button class="filter-btn" data-cat="network">🌐 Network</button>
    <button class="filter-btn" data-cat="storage">💾 Storage</button>
    <button class="filter-btn" data-cat="ci">🚀 CI/CD</button>
  </div>
</div>

<div class="results-count" id="resultsCount">Showing 100 of 100 questions</div>

<main id="mainContent"></main>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ TOP</button>

<script>
const questions = [
  // ═══════════════════════════════════════════
  // KUBERNETES — POD & CLUSTER ISSUES
  // ═══════════════════════════════════════════
  {
    num: 1, cat: "k8s", hot: true,
    q: "A Pod is suddenly in CrashLoopBackOff. How do you diagnose and fix it?",
    steps: ["Check pod status: kubectl get pod <name> -n <ns>","Describe for events: kubectl describe pod <name>","Get logs of crashed container: kubectl logs <pod> --previous","If init container issue: kubectl logs <pod> -c <init-container>","Check resource limits, liveness probes, env vars","Fix config/image and rollout: kubectl rollout restart deploy/<name>"],
    cmds: `kubectl get pod <pod-name> -n <namespace> -o wide\nkubectl describe pod <pod-name> -n <namespace>\nkubectl logs <pod-name> --previous --tail=100\nkubectl logs <pod-name> -c <init-container-name>\nkubectl get events --sort-by=.lastTimestamp -n <namespace>`,
    tip: "CrashLoopBackOff means the container starts, crashes, K8s waits (backoff), retries. Always check --previous logs first."
  },
  {
    num: 2, cat: "k8s", hot: true,
    q: "Pod CPU/memory spikes suddenly. How do you investigate and resolve?",
    steps: ["Check resource usage: kubectl top pods","Identify the spiky pod and check its limits","Exec into pod: kubectl exec -it <pod> -- top","Check HPA status: kubectl get hpa","Look at recent deployments or config changes","Temporarily scale up replicas if needed","Review and tune resource requests/limits"],
    cmds: `kubectl top pods -n <namespace> --sort-by=cpu\nkubectl top nodes\nkubectl exec -it <pod> -n <ns> -- top\nkubectl get hpa -n <namespace>\nkubectl describe hpa <hpa-name>\nkubectl scale deploy <name> --replicas=5`,
    tip: "Always set both requests AND limits. Requests are for scheduling; limits are the hard cap. Missing requests = wrong node placement."
  },
  {
    num: 3, cat: "k8s",
    q: "Node is NotReady. What's your triage process?",
    steps: ["kubectl get nodes to see status","kubectl describe node <name> for conditions","SSH into node, check kubelet: systemctl status kubelet","Check disk: df -h, memory: free -m","Check node network connectivity","Look at kubelet logs: journalctl -u kubelet -n 200","Drain and cordon if needed"],
    cmds: `kubectl get nodes -o wide\nkubectl describe node <node-name>\nkubectl cordon <node-name>   # stop scheduling\nkubectl drain <node-name> --ignore-daemonsets --delete-emptydir-data\nssh <node-ip>\nsystemctl status kubelet\njournalctl -u kubelet -n 200 --no-pager`,
    tip: "Most common causes: disk pressure, memory pressure, kubelet crash, network plugin failure. Check conditions in describe node output."
  },
  {
    num: 4, cat: "k8s",
    q: "Deployment rollout is stuck. How do you debug?",
    steps: ["Check rollout status: kubectl rollout status","Describe deployment for events","Check ReplicaSet status","Look at pod events for image pull or probe failures","If needed, rollback immediately"],
    cmds: `kubectl rollout status deployment/<name> -n <ns>\nkubectl rollout history deployment/<name>\nkubectl describe deployment <name>\nkubectl get rs -n <namespace>\n# Rollback immediately:\nkubectl rollout undo deployment/<name>\nkubectl rollout undo deployment/<name> --to-revision=2`,
    tip: "Set maxUnavailable and maxSurge in your strategy. A stuck rollout usually means new pods can't start (image, probe, quota)."
  },
  {
    num: 5, cat: "k8s",
    q: "Service is not reachable inside the cluster. How do you troubleshoot?",
    steps: ["Verify service exists and endpoints are populated","Check selector matches pod labels","Test DNS resolution from a pod","curl the ClusterIP directly","Check NetworkPolicy if present","Verify kube-proxy is running on nodes"],
    cmds: `kubectl get svc <svc-name> -n <ns>\nkubectl get endpoints <svc-name> -n <ns>\n# Test from inside cluster:\nkubectl run tmp --image=busybox --rm -it -- sh\n# Inside pod:\nnslookup <svc-name>.<namespace>.svc.cluster.local\ncurl http://<svc-name>.<namespace>.svc.cluster.local:<port>\nkubectl get networkpolicy -n <namespace>`,
    tip: "Empty Endpoints = selector mismatch. Check kubectl get pods --show-labels vs service selector."
  },
  {
    num: 6, cat: "k8s", hot: true,
    q: "OOMKilled — Pod keeps getting killed by OOM. What do you do?",
    steps: ["Check termination reason: kubectl describe pod","Look at memory limits set on container","Check what's consuming memory (exec + top/ps)","Increase memory limit or optimize app","Consider VPA for auto-recommendations","Add memory profiling to app"],
    cmds: `kubectl describe pod <pod> | grep -A5 "Last State"\nkubectl top pod <pod> -n <ns> --containers\n# Check limits set:\nkubectl get pod <pod> -o jsonpath='{.spec.containers[*].resources}'\n# Exec and check:\nkubectl exec -it <pod> -- cat /proc/meminfo\nkubectl exec -it <pod> -- ps aux --sort=-%mem | head`,
    tip: "OOMKilled exit code is 137 (128 + SIGKILL=9). If it's the JVM, add -Xmx flags. If Node.js, use --max-old-space-size."
  },
  {
    num: 7, cat: "k8s",
    q: "Pods are in Pending state — not being scheduled. Why?",
    steps: ["kubectl describe pod to see reason","Check if nodes have enough resources","Check taints and tolerations","Check NodeSelector or Affinity rules","Check PVC if pod needs persistent storage","Check resource quota in namespace"],
    cmds: `kubectl describe pod <pod> | grep -A10 Events\nkubectl get nodes -o custom-columns='NAME:.metadata.name,CPU:.status.allocatable.cpu,MEM:.status.allocatable.memory'\nkubectl describe node <node> | grep -A10 Taints\nkubectl get resourcequota -n <namespace>\nkubectl get pvc -n <namespace>`,
    tip: "Most common: InsufficientCPU/Memory, Taint not tolerated, PVC not bound. Read the Events section in describe output."
  },
  {
    num: 8, cat: "k8s",
    q: "How do you investigate a sudden increase in API server latency?",
    steps: ["Check API server metrics via Prometheus/Grafana","Look for LIST/WATCH storms from controllers","Check etcd latency","Audit large watch connections","Check if any bulk operations running","Rate-limit or throttle clients"],
    cmds: `kubectl get --raw /metrics | grep apiserver_request_duration\nkubectl get --raw /metrics | grep etcd_request_duration\n# Check who's hammering the API:\nkubectl get --raw /metrics | grep apiserver_current_inflight\n# etcd check:\nETCDCTL_API=3 etcdctl endpoint health\nETCDCTL_API=3 etcdctl endpoint status`,
    tip: "API server latency spikes are often caused by unbounded LIST requests or too many watchers. Use resource version and pagination."
  },
  {
    num: 9, cat: "k8s",
    q: "etcd disk usage is high. How do you handle this?",
    steps: ["Check etcd data directory size","Run compaction: etcdctl compact","Run defrag after compaction","Monitor DB size metric","Set auto-compaction-retention","Consider increasing disk or migrating data"],
    cmds: `ETCDCTL_API=3 etcdctl endpoint status --write-out=table\nETCDCTL_API=3 etcdctl compact $(etcdctl endpoint status --write-out=json | jq '.[].Status.header.revision')\nETCDCTL_API=3 etcdctl defrag\nETCDCTL_API=3 etcdctl alarm disarm`,
    tip: "etcd has a default 2GB quota. If hit, cluster goes read-only. Compact + defrag regularly. Use --auto-compaction-retention=1."
  },
  {
    num: 10, cat: "k8s",
    q: "How do you debug a failing Kubernetes Job or CronJob?",
    steps: ["Check job status and completions","Look at pod created by job","Get logs from job pod","Check backoffLimit setting","Debug scheduling if CronJob not firing","Check time zone and schedule syntax"],
    cmds: `kubectl get jobs -n <ns>\nkubectl describe job <job-name>\nkubectl get pods --selector=job-name=<job-name> -n <ns>\nkubectl logs <job-pod-name>\n# CronJob:\nkubectl get cronjob -n <ns>\nkubectl describe cronjob <name>`,
    tip: "CronJobs use UTC by default. If your cron expression uses local time, account for offset. Also check concurrencyPolicy."
  },

  // ═══════════════════════════════════════════
  // KUBERNETES — NETWORKING
  // ═══════════════════════════════════════════
  {
    num: 11, cat: "network",
    q: "Ingress is returning 502 Bad Gateway. How do you debug?",
    steps: ["Check ingress controller pod logs","Verify backend service and endpoints","Check ingress rules for correct service/port","Test service directly via kubectl port-forward","Check annotations for timeout settings","Verify TLS if HTTPS"],
    cmds: `kubectl logs -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx --tail=100\nkubectl get ingress <name> -n <ns> -o yaml\nkubectl get svc <backend-svc> -n <ns>\nkubectl get endpoints <backend-svc> -n <ns>\nkubectl port-forward svc/<backend-svc> 8080:80 -n <ns>`,
    tip: "502 = ingress reached backend but backend failed. 503 = no backend available. 504 = timeout. Each points to different root cause."
  },
  {
    num: 12, cat: "network",
    q: "DNS resolution is failing inside pods. How do you diagnose?",
    steps: ["Check CoreDNS pods are running","Describe CoreDNS pods for errors","Check CoreDNS ConfigMap","Test DNS from a debug pod","Check ndots setting in pod spec","Verify cluster DNS service"],
    cmds: `kubectl get pods -n kube-system -l k8s-app=kube-dns\nkubectl logs -n kube-system -l k8s-app=kube-dns\nkubectl get configmap coredns -n kube-system -o yaml\n# Test DNS:\nkubectl run dnstest --image=busybox --rm -it -- nslookup kubernetes.default\nkubectl exec -it <pod> -- cat /etc/resolv.conf`,
    tip: "Check /etc/resolv.conf inside the pod. ndots:5 means adding domain suffixes before going external — can cause slow DNS for external URLs."
  },

  {num: 76, cat: "storage", q: "How do you backup and restore Kubernetes persistent volumes?", steps: ["Use Velero for cluster-level backup (PV + objects)","For DB: take application-level dumps, don't rely on PV copy","Volume snapshots via CSI driver","Velero with Restic for filesystem backup","Test restore regularly (DR drills)","Store backups in different region/account"], cmds: "# Velero backup:\nvelero backup create <name> --include-namespaces <ns>\nvelero backup describe <name>\nvelero restore create --from-backup <name>\n# Volume snapshot:\nkubectl get volumesnapshot -n <ns>", tip: "PV backup without app quiescing can be corrupt for DBs. Always use application-consistent backups for DBs (pg_dump, mysqldump) then back up the file. Velero is not a substitute for DB backups."},
  {num: 77, cat: "k8s", q: "How do you manage multiple Kubernetes clusters?", steps: ["Use kubeconfig contexts: kubectl config use-context","kubectx/kubens for quick switching","Use ArgoCD/Flux for multi-cluster GitOps","Terraform for cluster lifecycle management","Cluster API for K8s-native cluster management","Use centralized monitoring across clusters (Thanos)"], cmds: "kubectl config get-contexts\nkubectl config use-context <context-name>\n# kubectx:\nkubectx <context>\nkubens <namespace>\n# ArgoCD multi-cluster:\nkubectl config view --raw > /tmp/kubeconfig\nargocd cluster add <context>", tip: "Avoid running kubectl with wrong cluster context in prod. Use kubectx + kubens aliases. Color-code your terminal prompt by cluster (PS1 with kube context)."},
  {num: 78, cat: "ci", q: "GitOps with ArgoCD — how do you set it up and what problems does it solve?", steps: ["ArgoCD = K8s controller that syncs cluster state from Git","Install ArgoCD in cluster","Point Application CR to Git repo + path","ArgoCD detects drift and can auto-sync","Rollback = revert Git commit","Audit trail = Git history"], cmds: "# Install ArgoCD:\nkubectl create namespace argocd\nkubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml\n# Create Application:\nargocd app create myapp \\\n  --repo https://github.com/org/repo.git \\\n  --path k8s/ \\\n  --dest-server https://kubernetes.default.svc \\\n  --dest-namespace default\nargocd app sync myapp", tip: "GitOps = Git as the single source of truth. No kubectl apply in CI. CI builds + pushes image, updates image tag in Git, ArgoCD deploys. Full audit trail via Git."},
  {num: 79, cat: "debug", q: "How do you handle a thundering herd problem after a deployment?", steps: ["Stagger pod startup with PodDisruptionBudget","Use readiness probes to delay traffic","Add jitter to cache warm-up","Pre-warm caches before cutover","Use rate limiting to shed load during startup","Consider using progressive traffic shifting"], cmds: "# Add startup delay/jitter in app:\n# sleep((Math.random() * 10))  # 0-10s jitter\n\n# K8s: use startupProbe to delay readiness:\n# startupProbe:\n#   httpGet:\n#     path: /ready\n#   failureThreshold: 30\n#   periodSeconds: 10", tip: "Thundering herd: all new pods start simultaneously, hit cold cache, flood DB. Fix: stagger startup, pre-warm cache, add circuit breaker, exponential backoff on errors."},
  {num: 80, cat: "perf", q: "Kafka consumer lag is growing — how do you solve it?", steps: ["Check consumer group lag: kafka-consumer-groups","Identify slow consumers","Scale consumer instances (add partitions first if needed)","Check for processing bottlenecks","Optimize consumer batch size","Check for poison pill messages blocking partition"], cmds: "# Check consumer lag:\nkafka-consumer-groups.sh --bootstrap-server <broker>:9092 --describe --group <group>\n# Add partitions:\nkafka-topics.sh --alter --topic <topic> --partitions 12 \\\n  --bootstrap-server <broker>:9092\n# KEDA autoscale on lag:\n# trigger: kafka, lagThreshold: 100", tip: "Partitions = max parallelism. Can't reduce partitions, only increase. Consumers = min(consumers, partitions). If lag grows, add partitions then scale consumers. Check if one partition has a bad message."},
  {num: 81, cat: "k8s", q: "What are init containers and how are they useful?", steps: ["Init containers run to completion before app containers start","Sequential: each init must complete before next","Use for: wait for DB ready, download configs, set permissions","Share volumes with main containers","Can have different image than main container","Failure = pod restarts (all inits re-run)"], cmds: "# waitForDB init container:\n# initContainers:\n# - name: wait-for-db\n#   image: busybox\n#   command: ['sh', '-c', 'until nc -z db-svc 5432; do sleep 2; done']\n\nkubectl describe pod <name> | grep -A5 'Init Containers'", tip: "Init containers solve the 'app starts before dependency' problem elegantly. Much cleaner than sleep in entrypoint. Failures show up in init container logs."},
  {num: 82, cat: "network", q: "Explain Kubernetes service discovery and how pods find each other.", steps: ["K8s creates DNS records for every service","Format: <svc>.<ns>.svc.cluster.local","Pods can use short name if in same namespace","Headless services: DNS returns pod IPs","Environment variables: K8s injects SVC_HOST, SVC_PORT","Search domains in /etc/resolv.conf allow short names"], cmds: "# Test DNS:\nkubectl exec -it <pod> -- nslookup kubernetes.default\nkubectl exec -it <pod> -- cat /etc/resolv.conf\n# Full qualified name:\nnslookup <svc>.<ns>.svc.cluster.local\n# Short name (same namespace):\nnslookup <svc>", tip: "Use full FQDNs in cross-namespace communication. Short names only resolve within the same namespace search domain. Headless + StatefulSet = stable DNS per pod."},
  {num: 83, cat: "debug", q: "How do you do a post-mortem for a production incident?", steps: ["Write timeline of events (factual, no blame)","Identify root cause (5 Whys technique)","Document contributing factors","Write action items with owners and deadlines","Share with team (blameless culture)","Track action items to completion","Update runbooks and alerts"], cmds: "# 5 Whys example:\n# 1. Why did service go down? Pod OOMKilled\n# 2. Why OOMKilled? Memory limit too low\n# 3. Why limit too low? Never profiled real usage\n# 4. Why no profiling? No performance testing\n# 5. Why no perf testing? Not in deployment checklist\n# Action: Add perf testing + memory profiling to checklist", tip: "Blameless = find process/system failures, not person failures. If you blame someone, they hide future mistakes. Focus on: what conditions allowed this to happen?"},
  {num: 84, cat: "storage", q: "How do you configure log rotation for containers to prevent disk full?", steps: ["Set Docker log driver options: max-size, max-file","Configure per-container in compose or K8s","Use log aggregation (Loki, ELK) and disable local logging","Monitor /var/lib/docker disk usage","Set up alerting before disk hits 80%","Consider using journald log driver"], cmds: "# Docker daemon.json:\n# {\n#   \"log-driver\": \"json-file\",\n#   \"log-opts\": {\n#     \"max-size\": \"100m\",\n#     \"max-file\": \"3\"\n#   }\n# }\n\n# Per container in compose:\n# logging:\n#   driver: json-file\n#   options:\n#     max-size: '50m'\n#     max-file: '5'", tip: "Default Docker logging has NO rotation limit. On long-running containers, logs can fill the entire disk. Always set max-size in daemon.json or per container."},
  {num: 85, cat: "k8s", q: "How does Kubernetes handle secrets — what are the security concerns?", steps: ["Secrets stored in etcd (base64 encoded, NOT encrypted by default)","Enable etcd encryption at rest","Use sealed-secrets or external-secrets operator","RBAC: restrict who can read secrets","Prefer secret stores: Vault, AWS SM, GCP SM","Audit: who accessed secrets (K8s audit log)"], cmds: "# Enable etcd encryption:\n# /etc/kubernetes/encryption-config.yaml\n# Create ExternalSecret:\nkubectl get externalsecret -n <ns>\n# SealedSecret:\nkubeseal --format yaml < secret.yaml > sealed-secret.yaml\n# Check who can read secrets:\nkubectl auth can-i get secrets -n <ns> --as <user>", tip: "kubectl get secret -o yaml shows base64, not encrypted. Anyone with RBAC access to secrets sees them. Use external-secrets with Vault/AWS SM for production."},
  {num: 86, cat: "ci", q: "How do you implement database migrations safely in CI/CD?", steps: ["Run migrations as separate Job before app update","Use backwards-compatible migrations (expand/contract pattern)","Test rollback of migration","Never drop columns until old code is gone","Use migration tools: Flyway, Liquibase, golang-migrate","Lock mechanism to prevent concurrent migrations"], cmds: "# K8s migration Job:\n# kind: Job\n# spec:\n#   template:\n#     spec:\n#       containers:\n#       - name: migrate\n#         image: app:v2\n#         command: ['./migrate', 'up']\n#       restartPolicy: Never\n\nkubectl wait --for=condition=complete job/migrate --timeout=120s", tip: "Expand/Contract: Step 1: add new column (backwards compatible). Step 2: deploy code using new column. Step 3: remove old column. Never do all in one deploy."},
  {num: 87, cat: "perf", q: "How do you reduce Docker image size significantly?", steps: ["Use alpine or distroless base","Multi-stage builds (copy only artifacts)","Remove dev dependencies after build","Use .dockerignore to exclude test files, docs","Minimize layers: combine RUN commands","Remove package manager cache in same RUN layer"], cmds: "# Combine RUN to reduce layers:\n# RUN apt-get update && \\\n#     apt-get install -y curl && \\\n#     apt-get clean && \\\n#     rm -rf /var/lib/apt/lists/*\n\n# Analyze with dive:\ndocker run --rm -it -v /var/run/docker.sock:/var/run/docker.sock wagoodman/dive <image>", tip: "Biggest wins: 1) multi-stage (1GB → 100MB), 2) alpine base (300MB → 50MB), 3) no dev deps, 4) .dockerignore. Aim for <100MB for most apps."},
  {num: 88, cat: "debug", q: "How do you handle stuck Kubernetes namespaces that won't delete?", steps: ["Check what's still in the namespace","Delete all resources manually","Check for finalizers blocking deletion","Remove finalizers: kubectl patch","Check for CRDs with resources","Force-remove namespace finalizer via API"], cmds: "kubectl get all -n <stuck-ns>\nkubectl api-resources --verbs=list -o name | xargs -I{} kubectl get {} -n <ns> 2>/dev/null\n# Remove namespace finalizer:\nkubectl get namespace <ns> -o json | jq '.spec.finalizers = []' | kubectl replace --raw /api/v1/namespaces/<ns>/finalize -f -", tip: "Stuck namespaces = resources with finalizers preventing deletion. Common culprits: Istio resources, Velero backups, custom CRDs. Find and remove finalizers."},
  {num: 89, cat: "network", q: "How do you implement egress control in Kubernetes (restrict outbound traffic)?", steps: ["Default: pods can reach anything","NetworkPolicy egress rules restrict outbound","Allow only needed external IPs/CIDRs","Use Istio ServiceEntry for service mesh egress","Consider egress gateway for centralized control","Audit egress with network flow logs"], cmds: "# Deny all egress, allow only DNS + specific CIDR:\n# spec:\n#   podSelector:\n#     matchLabels:\n#       app: restricted\n#   policyTypes: [Egress]\n#   egress:\n#   - to: [{namespaceSelector: {}}]  # cluster DNS\n#     ports: [{port: 53, protocol: UDP}]\n#   - to: [{ipBlock: {cidr: '10.0.0.0/8'}}]", tip: "Egress NetworkPolicy only works if your CNI supports it (Calico, Cilium, Weave). Flannel doesn't. Cilium has much richer egress control including FQDN-based policies."},
  {num: 90, cat: "k8s", q: "Explain Kubernetes control plane components and what happens if each fails.", steps: ["API Server: all requests go through it. Failure = no kubectl, no scheduling","etcd: all cluster state. Failure = cluster frozen, no changes","Scheduler: assigns pods to nodes. Failure = new pods pending forever (existing fine)","Controller Manager: reconciliation loops. Failure = no self-healing (existing pods ok)","Cloud Controller: LB/volume provisioning. Failure = no new LBs/PVs"], cmds: "kubectl get componentstatuses\nkubectl get pods -n kube-system\n# Check each component:\nkubectl logs -n kube-system kube-apiserver-<node>\nkubectl logs -n kube-system kube-scheduler-<node>\nkubectl logs -n kube-system kube-controller-manager-<node>", tip: "API server and etcd are the most critical. Run odd number (3,5) of etcd nodes for quorum. API server can be multiple but needs load balancer in front."},
  {num: 91, cat: "debug", q: "How do you debug when only some users are experiencing errors (not all)?", steps: ["Check if traffic is hitting specific pods (uneven distribution)","Check if errors are by user-agent, region, or account type","Add per-request logging with user context","Check A/B test or feature flag configurations","Look for DB row-level issues (specific user's data)","Check if affected users share infrastructure (same shard/node)"], cmds: "# Check pod-level error rates:\nfor pod in $(kubectl get pods -n <ns> -l app=<name> -o name); do\n  echo \"$pod: $(kubectl logs $pod --since=5m | grep -c ERROR)\"\ndone\n# If using Prometheus:\n# sum by(pod) (rate(http_requests_total{status=~'5.*'}[5m]))", tip: "Uneven errors across pods = pod-specific issue (state, bad config). Errors for specific users = data issue or feature flag. Use request tracing with user context."},
  {num: 92, cat: "storage", q: "How do you run a database in Kubernetes — what are the tradeoffs?", steps: ["StatefulSet for ordered, stable pod identity","Persistent volumes for data","Headless service for stable DNS per pod","Use operator (CloudNativePG, MySQL Operator) for Day 2 ops","Consider: managed DB (RDS, Cloud SQL) vs self-managed","Backups, failover, replication: much harder than stateless apps"], cmds: "kubectl get statefulsets -A\nkubectl get pvc -n <db-ns>\n# CloudNativePG:\nkubectl get cluster -n <ns>\nkubectl get pods -n <ns> -l cnpg.io/cluster=<name>\n# Check replica lag:\nkubectl exec -it <replica-pod> -- psql -U postgres -c 'SELECT * FROM pg_stat_replication;'", tip: "Managed DB > K8s DB for most teams. Run DB in K8s only if: you need full control, on-prem, or using a mature operator. If you do, use StatefulSet + operator, never Deployment."},
  {num: 93, cat: "ci", q: "How do you manage Helm chart upgrades safely?", steps: ["Always use --dry-run first","Use helm diff plugin to see changes","Take backup/snapshot before upgrade","Test in lower environment first","Use atomic flag for automatic rollback on failure","Keep upgrade history: helm history"], cmds: "helm upgrade --dry-run --debug <release> ./chart -f values.yaml\nhelm diff upgrade <release> ./chart -f values.yaml\nhelm upgrade --atomic --timeout 5m <release> ./chart -f values.yaml\nhelm history <release>\nhelm rollback <release> <revision>", tip: "helm upgrade --atomic = rolls back automatically on failure. Always check helm diff before apply in prod. Store values files in Git, not local only."},
  {num: 94, cat: "perf", q: "How do you optimize a containerized Node.js app for production performance?", steps: ["Set NODE_ENV=production (disables dev overhead)","Use cluster module or PM2 to use all CPU cores","Set --max-old-space-size appropriately","Enable keep-alive for HTTP connections","Use compression middleware","Implement proper connection pooling for DB"], cmds: "# Dockerfile production:\n# ENV NODE_ENV=production\n# CMD [\"node\", \"--max-old-space-size=512\", \"dist/index.js\"]\n\n# Cluster mode:\n# const cluster = require('cluster');\n# const numCPUs = require('os').cpus().length;\n# if (cluster.isMaster) {\n#   for (let i = 0; i < numCPUs; i++) cluster.fork();\n# }", tip: "Node.js is single-threaded per process. A 4-vCPU container with cluster = 4 workers = 4x throughput. Set worker count = (CPU - 1) to leave room for OS."},
  {num: 95, cat: "k8s", q: "What is Kubernetes Finalizer and how can it cause issues?", steps: ["Finalizer = lifecycle hook that delays deletion","K8s sets deletionTimestamp but waits for finalizer removal","Controller must remove finalizer after cleanup","If controller is gone, resource is stuck forever","Remove manually: kubectl patch to empty finalizers","Avoid finalizers if possible for simple resources"], cmds: "kubectl get <resource> <name> -o yaml | grep finalizers\n# Remove finalizer manually:\nkubectl patch <resource> <name> -p '{\"metadata\":{\"finalizers\":[]}}' --type=merge\n# Or edit:\nkubectl edit <resource> <name>  # remove finalizers list", tip: "Finalizers are critical for cleanup (PV deletion, external resource cleanup) but dangerous if controller crashes. Always implement finalizer removal logic with idempotent cleanup."},
  {num: 96, cat: "network", q: "How do you troubleshoot high connection refused errors between services?", steps: ["Check if target service is up and endpoints populated","Test port directly: telnet or nc -zv","Check if app is listening on right port/interface","Verify service port matches containerPort","Check for firewall/security group","Look for too many connections (ulimit)"], cmds: "kubectl exec -it <pod> -- nc -zv <target-svc> <port>\nkubectl exec -it <pod> -- ss -tlnp\nkubectl get svc <name> -o yaml | grep -E 'port|targetPort'\nkubectl get endpoints <name>\n# Check listen:\nkubectl exec -it <target-pod> -- ss -tlnp | grep <port>", tip: "Connection refused = port not open. Connection timeout = port open but no response (firewall, overload). These have different root causes — distinguish them first."},
  {num: 97, cat: "debug", q: "How do you detect and prevent configuration drift in Kubernetes?", steps: ["Use GitOps (ArgoCD/Flux) to detect drift automatically","kubectl diff to compare live vs file","ArgoCD shows OutOfSync resources","Use OPA/Gatekeeper to prevent invalid configs","Audit changes: kubectl audit logs","Treat cluster config as immutable — always deploy from Git"], cmds: "# Check drift with ArgoCD:\nargocd app get <app> | grep 'Sync Status'\n# kubectl diff:\nkubectl diff -f k8s/\n# OPA Gatekeeper:\nkubectl get constraints\nkubectl get constrainttemplate", tip: "Drift = someone ran kubectl apply manually bypassing Git. GitOps auto-corrects drift (if autoSync enabled). Audit logs tell you who drifted. Use RBAC to prevent direct kubectl in prod."},
  {num: 98, cat: "perf", q: "How do you load test a Kubernetes service and analyze results?", steps: ["Use k6, Vegeta, or Locust for load generation","Start with small load, ramp up","Monitor pods: kubectl top during test","Watch HPA scale-up behavior","Check error rates and p99 latency","Identify the bottleneck (CPU, memory, DB, network)"], cmds: "# k6 load test:\nk6 run script.js\n# Vegeta:\necho 'GET https://api.example.com/endpoint' | vegeta attack -rate=100 -duration=60s | vegeta report\n# Watch during test:\nwatch -n2 kubectl top pods -n <ns>\nwatch -n2 kubectl get hpa -n <ns>", tip: "Always load test in a prod-like environment (same resource limits, same data volume). Staging with 10x fewer replicas gives wrong results. Test until the system breaks to find capacity."},
  {num: 99, cat: "k8s", q: "How do you implement Kubernetes multi-tenancy safely?", steps: ["Namespace per tenant for isolation","RBAC: bind tenant to their namespace only","NetworkPolicy: deny cross-namespace traffic","ResourceQuota + LimitRange per namespace","Node selectors or dedicated nodes for full isolation","Consider vcluster for stronger isolation"], cmds: "# Namespace per tenant with quota:\nkubectl create namespace tenant-a\nkubectl create resourcequota tenant-quota --hard=cpu=4,memory=8Gi,pods=20 -n tenant-a\n# RBAC:\nkubectl create rolebinding tenant-a-admin --clusterrole=admin --user=tenant-a-user -n tenant-a\n# Network isolation:\nkubectl apply -f deny-from-other-namespaces.yaml", tip: "Soft multi-tenancy (namespace isolation) = suitable for trusted internal teams. Hard multi-tenancy (separate clusters or vcluster) = required for untrusted external tenants."},
  {num: 100, cat: "debug", hot: true, q: "You're on-call and get woken at 3am — P0 production outage. Walk through your response.", steps: ["Don't panic. Open laptop, check monitoring first","Acknowledge the alert (stop alarm escalation)","Identify blast radius: what's affected, how many users","Quick win: is there a recent deployment? Rollback now.","If no rollback option: gather data (logs, metrics, traces)","Communicate status every 15 mins to stakeholders","Mitigate > Investigate. Restore service first.","Document everything in real-time for post-mortem","After: write post-mortem, implement preventions"], cmds: "# P0 quick triage:\nkubectl get pods -A | grep -v Running | grep -v Completed\nkubectl get events -A --sort-by=.lastTimestamp | tail -20\nkubectl top nodes\nkubectl rollout history deploy/<last-deployed> -n <ns>\n# Rollback if deployment was recent:\nkubectl rollout undo deploy/<name> -n <ns>\n# Check logs:\nkubectl logs -n <ns> -l app=<name> --since=30m | grep -i 'error\\|fatal\\|panic'", tip: "3am rule: rollback first, understand later. A 2-hour debug session costs more than a 5-minute rollback. Document the timeline as you go — your future self will thank you."}

// Render
function getTagHTML(cat, hot) {
  const tagMap = {k8s:'tag-k8s',docker:'tag-docker',debug:'tag-debug',perf:'tag-perf',network:'tag-network',storage:'tag-storage',ci:'tag-ci'};
  const labelMap = {k8s:'K8s',docker:'Docker',debug:'Debug',perf:'Perf',network:'Network',storage:'Storage',ci:'CI/CD'};
  let html = `<span class="tag ${tagMap[cat]}">${labelMap[cat]}</span>`;
  if (hot) html += `<span class="tag tag-hot">🔥 HOT</span>`;
  return html;
}

function formatCmds(cmds) {
  if (!cmds) return '';
  return cmds.split('\n').map(line => {
    if (line.startsWith('#')) return `<span class="cmd-comment">${line}</span>`;
    return `<span class="cmd-cmd">${line}</span>`;
  }).join('\n');
}

function renderCards() {
  const main = document.getElementById('mainContent');
  const cats = ['k8s','docker','debug','perf','network','storage','ci'];
  const catLabels = {k8s:'☸ Kubernetes',docker:'🐳 Docker',debug:'🔥 Debugging & Troubleshooting',perf:'⚡ Performance',network:'🌐 Networking',storage:'💾 Storage',ci:'🚀 CI/CD'};
  const catColors = {k8s:getComputedStyle(document.documentElement).getPropertyValue('--blue'),docker:'#60a5fa',debug:'var(--red)',perf:'var(--yellow)',network:'var(--purple)',storage:'var(--green)',ci:'#34d399'};

  cats.forEach(cat => {
    const catQs = questions.filter(q => q.cat === cat);
    const section = document.createElement('div');
    section.className = 'category-section';
    section.dataset.cat = cat;

    section.innerHTML = `<div class="category-header">
      <div class="category-icon" style="background:${catColors[cat]}22; color:${catColors[cat]};font-size:18px">${catLabels[cat].split(' ')[0]}</div>
      <div class="category-title">${catLabels[cat].substring(catLabels[cat].indexOf(' ')+1)}</div>
      <div class="category-count">${catQs.length} questions</div>
    </div>`;

    catQs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.dataset.cat = q.cat;
      card.dataset.num = q.num;
      card.dataset.q = q.q.toLowerCase();

      const stepsHTML = q.steps ? `<div class="answer-section"><div class="ans-label">📋 Steps</div><ul class="steps">${q.steps.map((s,i)=>`<li><span class="step-num">${i+1}.</span><span>${s}</span></li>`).join('')}</ul></div>` : '';
      const cmdsHTML = q.cmds ? `<div class="answer-section"><div class="ans-label">💻 Commands</div><div class="cmd-block">${formatCmds(q.cmds)}</div></div>` : '';
      const tipHTML = q.tip ? `<div class="tip-box"><strong>💡 Interview Tip:</strong> ${q.tip}</div>` : '';

      card.innerHTML = `<div class="q-header">
        <div class="q-num">#${String(q.num).padStart(2,'0')}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-tags">${getTagHTML(q.cat, q.hot)}</div>
        <div class="q-toggle">▼</div>
      </div>
      <div class="q-answer">${stepsHTML}${cmdsHTML}${tipHTML}</div>`;

      card.querySelector('.q-header').addEventListener('click', () => {
        card.classList.toggle('open');
      });

      section.appendChild(card);
    });

    main.appendChild(section);
  });
}

// Filter + Search
let currentCat = 'all';
let currentSearch = '';

function updateVisibility() {
  let visible = 0;
  document.querySelectorAll('.q-card').forEach(card => {
    const catMatch = currentCat === 'all' || card.dataset.cat === currentCat;
    const searchMatch = !currentSearch || card.dataset.q.includes(currentSearch.toLowerCase());
    if (catMatch && searchMatch) { card.classList.remove('hidden'); visible++; }
    else { card.classList.add('hidden'); card.classList.remove('open'); }
  });

  // Hide empty sections
  document.querySelectorAll('.category-section').forEach(sec => {
    const hasVisible = sec.querySelectorAll('.q-card:not(.hidden)').length > 0;
    sec.style.display = hasVisible ? '' : 'none';
  });

  document.getElementById('resultsCount').textContent = `Showing ${visible} of 100 questions`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    updateVisibility();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  updateVisibility();
});

// Progress bar
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('pgbar').style.width = pct + '%';
  document.getElementById('backTop').classList.toggle('visible', h.scrollTop > 500);
});

renderCards();
</script>
